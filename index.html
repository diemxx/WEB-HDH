<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ôn thi Hệ điều hành – 400 câu trắc nghiệm</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1d4ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--pri:#1d4ed8;--ok:#15803d;--bad:#b91c1c;--line:#dbe2ea;--soft:#eef4ff}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#0f2e68,#2563eb);color:#fff;padding:24px 18px} header .wrap{max-width:1000px;margin:auto} h1{font-size:clamp(23px,4vw,36px);margin:0 0 7px} header p{margin:0;opacity:.88}
.wrap{max-width:1000px;margin:auto;padding:18px} .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 25px rgba(15,23,42,.06);margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px} label{font-weight:650;font-size:14px} select,input[type=number]{width:100%;margin-top:6px;padding:11px;border:1px solid #cbd5e1;border-radius:10px;background:white;font-size:15px}
button{border:0;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;font-size:15px} .primary{background:var(--pri);color:#fff} .secondary{background:#e8eef8;color:#17345f} .danger{background:#fee2e2;color:#991b1b} .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.hidden{display:none!important} .topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap} .progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:12px} .progress>div{height:100%;background:var(--pri);width:0}
.qmeta{color:var(--muted);font-size:14px;margin-bottom:8px} .qtext{font-size:19px;font-weight:750;line-height:1.45;margin-bottom:14px} .option{display:block;border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin:9px 0;cursor:pointer;line-height:1.4} .option:hover{background:#f8fafc} .option input{margin-right:10px} .option.correct{border-color:#22c55e;background:#ecfdf3} .option.wrong{border-color:#ef4444;background:#fff1f2} .feedback{margin-top:12px;font-weight:700} .ok{color:var(--ok)} .bad{color:var(--bad)}
.nav{display:flex;justify-content:space-between;gap:10px;margin-top:16px} .score{font-size:42px;font-weight:850;color:var(--pri)} .review-item{border-top:1px solid var(--line);padding:14px 0} .pill{display:inline-block;background:var(--soft);color:#1e40af;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700} .small{font-size:13px;color:var(--muted)}
@media(max-width:600px){.wrap{padding:12px}.card{padding:14px;border-radius:13px}.qtext{font-size:17px}button{flex:1}}
</style></head>
<body>
<header><div class="wrap"><h1>Ôn thi Hệ điều hành</h1><p>400 câu trắc nghiệm từ tài liệu ôn tập • tự chấm điểm • xem lại câu sai</p></div></header>
<main class="wrap">
<section id="setup" class="card">
<h2 style="margin-top:0">Thiết lập bài làm</h2>
<div class="grid">
<div><label>Chương<select id="chapter"><option value="all">Tất cả 8 chương</option></select></label></div>
<div><label>Số câu<select id="count"><option>10</option><option>20</option><option>30</option><option>50</option><option>100</option><option value="all">Tất cả</option></select></label></div>
<div><label>Kiểu làm<select id="mode"><option value="end">Nộp bài rồi xem đáp án</option><option value="instant">Xem đáp án ngay</option></select></label></div>
<div><label>Thứ tự<select id="shuffle"><option value="yes">Trộn câu hỏi</option><option value="no">Theo thứ tự tài liệu</option></select></label></div>
</div>
<div class="actions"><button class="primary" id="start">Bắt đầu làm bài</button><button class="secondary" id="resume">Tiếp tục bài đang làm</button></div>
<p class="small">Bài đang làm được lưu tự động trên thiết bị.</p>
</section>
<section id="quiz" class="hidden">
<div class="card"><div class="topbar"><div><b id="position"></b><div class="small" id="chapterName"></div></div><div class="pill" id="answeredCount">Đã làm 0/0</div></div><div class="progress"><div id="progressBar"></div></div></div>
<div class="card"><div class="qmeta" id="qmeta"></div><div class="qtext" id="qtext"></div><div id="options"></div><div id="feedback" class="feedback"></div><div class="nav"><button class="secondary" id="prev">← Câu trước</button><button class="primary" id="next">Câu tiếp →</button></div></div>
<div class="card"><div class="actions"><button class="primary" id="submit">Nộp bài</button><button class="danger" id="quit">Thoát bài</button></div></div>
</section>
<section id="result" class="card hidden"><h2 style="margin-top:0">Kết quả</h2><div class="score" id="score"></div><p id="summary"></p><div class="actions"><button class="primary" id="retryWrong">Làm lại câu sai</button><button class="secondary" id="newQuiz">Tạo bài mới</button></div><h3>Xem lại</h3><div id="review"></div></section>
</main>
<script>
const BANK=[{"id":"c1q1","chapter":1,"chapterTitle":"GIỚI THIỆU","number":1,"question":"Hệ điều hành là gì?","options":{"A":"Là phần cứng máy tính cung cấp tài nguyên tính toán.","B":"Là chương trình hoạt động trung gian giữa người sử dụng và phần cứng máy tính.","C":"Là một chương trình ứng dụng để soạn thảo văn bản.","D":"Là cơ sở dữ liệu của hệ thống máy tính."},"answer":"B"},{"id":"c1q2","chapter":1,"chapterTitle":"GIỚI THIỆU","number":2,"question":"Hệ thống máy tính được chia làm mấy thành phần cơ bản?","options":{"A":"2 thành phần","B":"3 thành phần","C":"4 thành phần","D":"5 thành phần"},"answer":"C"},{"id":"c1q3","chapter":1,"chapterTitle":"GIỚI THIỆU","number":3,"question":"Bốn thành phần của hệ thống máy tính bao gồm những gì?","options":{"A":"CPU, Bộ nhớ, Các thiết bị nhập xuất, Hệ điều hành.","B":"Trình biên dịch, Trình duyệt web, Hệ điều hành, Người dùng.","C":"Phần cứng, Hệ điều hành, Chương trình ứng dụng, Người sử dụng.","D":"Phần mềm, Phần cứng, Mạng, Dữ liệu."},"answer":"C"},{"id":"c1q4","chapter":1,"chapterTitle":"GIỚI THIỆU","number":4,"question":"Trình biên dịch, trình duyệt web và hệ cơ sở dữ liệu thuộc thành phần nào của hệ thống máy tính?","options":{"A":"Phần cứng.","B":"Hệ điều hành.","C":"Chương trình ứng dụng.","D":"Môi trường tính toán."},"answer":"C"},{"id":"c1q5","chapter":1,"chapterTitle":"GIỚI THIỆU","number":5,"question":"Mục tiêu thiết kế hệ điều hành cho máy tính mainframe hoặc minicomputer là gì?","options":{"A":"Tối ưu hóa thời gian hoạt động của pin.","B":"Chạy không cần sự can thiệp của người sử dụng.","C":"Thỏa mãn tất cả người dùng truy cập.","D":"Giải quyết hợp lý việc sử dụng tài nguyên giữa máy trạm và máy chủ."},"answer":"C"},{"id":"c1q6","chapter":1,"chapterTitle":"GIỚI THIỆU","number":6,"question":"Hệ điều hành cho các thiết bị máy tính xách tay (laptop) thường chú trọng tối ưu điều gì?","options":{"A":"Giao diện không cần người dùng can thiệp.","B":"Thỏa mãn đồng thời hàng ngàn người dùng truy cập.","C":"Khả năng sử dụng và thời gian hoạt động của Pin do tài nguyên hệ thống ít.","D":"Tốc độ truyền tải mạng SAN."},"answer":"C"},{"id":"c1q7","chapter":1,"chapterTitle":"GIỚI THIỆU","number":7,"question":"Đứng ở góc độ hệ thống, hệ điều hành đóng vai trò là:","options":{"A":"Môi trường kết nối mạng Internet.","B":"Bộ cấp phát tài nguyên và chương trình điều khiển.","C":"Nền tảng tạo ra các chương trình ứng dụng.","D":"Trình quản lý máy ảo (VMM)."},"answer":"B"},{"id":"c1q8","chapter":1,"chapterTitle":"GIỚI THIỆU","number":8,"question":"Nhiệm vụ của hệ điều hành với tư cách là \"Chương trình điều khiển\" là gì?","options":{"A":"Cấp phát CPU và bộ nhớ cho người dùng.","B":"Điều khiển việc thực thi chương trình để ngăn chặn lỗi và việc sử dụng máy tính không đúng cách.","C":"Khởi tạo tất cả các thành phần của hệ thống khi bật máy.","D":"Chạy trình duyệt web tự động."},"answer":"B"},{"id":"c1q9","chapter":1,"chapterTitle":"GIỚI THIỆU","number":9,"question":"Chương trình tự khởi động (bootstrap program) được lưu trữ ở đâu?","options":{"A":"RAM.","B":"Đĩa cứng (Hard disk).","C":"ROM hoặc EPROM.","D":"Bộ nhớ đệm (Cache)."},"answer":"C"},{"id":"c1q10","chapter":1,"chapterTitle":"GIỚI THIỆU","number":10,"question":"Tên gọi khác của phần mềm được lưu trữ trong ROM hoặc EPROM dùng để khởi động máy là gì?","options":{"A":"Firmware (Phần dẻo).","B":"Middleware (Phần mềm trung gian).","C":"Shareware.","D":"Hardware (Phần cứng)."},"answer":"A"},{"id":"c1q11","chapter":1,"chapterTitle":"GIỚI THIỆU","number":11,"question":"Hoạt động nào xảy ra khi bộ điều khiển thiết bị kết thúc hoạt động của nó?","options":{"A":"Xóa toàn bộ bộ nhớ đệm.","B":"Gây ra một ngắt (interrupt) để thông báo cho CPU.","C":"Khởi động lại hệ thống máy tính.","D":"Chuyển sang chế độ User mode."},"answer":"B"},{"id":"c1q12","chapter":1,"chapterTitle":"GIỚI THIỆU","number":12,"question":"Véc tơ ngắt (interrupt vector) chứa thông tin gì?","options":{"A":"Dữ liệu của thiết bị nhập xuất.","B":"Nội dung của bộ đếm chương trình.","C":"Địa chỉ của tất cả các chương trình phục vụ ngắt.","D":"Mật khẩu của người quản trị."},"answer":"C"},{"id":"c1q13","chapter":1,"chapterTitle":"GIỚI THIỆU","number":13,"question":"Bẫy lỗi (trap) hoặc ngoại lệ (exception) được định nghĩa là:","options":{"A":"Một ngắt cứng từ thiết bị ngoại vi.","B":"Một ngắt mềm được tạo ra bởi một lỗi hoặc một yêu cầu của người sử dụng.","C":"Một chức năng dọn dẹp bộ nhớ.","D":"Tín hiệu khởi động lại máy tính."},"answer":"B"},{"id":"c1q14","chapter":1,"chapterTitle":"GIỚI THIỆU","number":14,"question":"Khi xảy ra ngắt, hệ điều hành duy trì trạng thái của CPU bằng cách nào?","options":{"A":"Đóng tất cả các chương trình ứng dụng đang chạy.","B":"Lưu trữ nội dung các thanh ghi và bộ đếm chương trình.","C":"Ngắt nguồn điện tạm thời của CPU.","D":"Đưa CPU vào trạng thái nghỉ (Sleep mode)."},"answer":"B"},{"id":"c1q15","chapter":1,"chapterTitle":"GIỚI THIỆU","number":15,"question":"Theo định nghĩa lưu trữ, 1 Gigabyte (GB) bằng bao nhiêu bytes?","options":{"A":"230 bytes = 100000000","B":"200000 bytes","C":"1000 bytes","D":"100 bytes"},"answer":"A"},{"id":"c1q16","chapter":1,"chapterTitle":"GIỚI THIỆU","number":16,"question":"1 Petabyte (PB) bằng bao nhiêu bytes?","options":{"A":"500000 bytes","B":"250000 bytes","C":"250 bytes","D":"10000000 bytes"},"answer":"B"},{"id":"c1q17","chapter":1,"chapterTitle":"GIỚI THIỆU","number":17,"question":"Hai tính chất cơ bản của bộ nhớ chính (Main memory) là gì?","options":{"A":"Truy cập ngẫu nhiên và tính khả biến.","B":"Truy cập tuần tự và tính khả biến.","C":"Truy cập ngẫu nhiên và tính bất biến.","D":"Dung lượng lớn nhất và tốc độ chậm nhất."},"answer":"A"},{"id":"c1q18","chapter":1,"chapterTitle":"GIỚI THIỆU","number":18,"question":"Đĩa Solid-state (SSD) có đặc điểm nào sau đây so với đĩa cứng truyền thống?","options":{"A":"Chậm hơn và khả biến.","B":"Nhanh hơn và bất biến.","C":"Dung lượng nhỏ nhưng tính khả biến cao.","D":"Lưu trữ bằng băng từ."},"answer":"B"},{"id":"c1q19","chapter":1,"chapterTitle":"GIỚI THIỆU","number":19,"question":"Hệ thống nhớ được tổ chức phân cấp theo 3 tiêu chí nào?","options":{"A":"Dung lượng, Giao diện, Hãng sản xuất.","B":"Tốc độ, Giá thành, Tính không ổn định.","C":"Tốc độ, Dung lượng, Mức độ bảo mật.","D":"Giá thành, Trọng lượng, Điện năng tiêu thụ."},"answer":"B"},{"id":"c1q20","chapter":1,"chapterTitle":"GIỚI THIỆU","number":20,"question":"Kỹ thuật Caching có mục đích gì?","options":{"A":"Tăng dung lượng đĩa cứng.","B":"Nén dữ liệu để tiết kiệm không gian.","C":"Sao chép thông tin vào hệ thống lưu trữ nhanh hơn để tăng tốc độ xử lý.","D":"Mã hóa dữ liệu người dùng."},"answer":"C"},{"id":"c1q21","chapter":1,"chapterTitle":"GIỚI THIỆU","number":21,"question":"Trình điều khiển thiết bị (Device Driver) làm nhiệm vụ gì?","options":{"A":"Trực tiếp biên dịch mã nguồn.","B":"Quản lý việc Nhập/Xuất và cung cấp giao tiếp thống nhất giữa trình điều khiển và Kernel.","C":"Chống phân mảnh đĩa cứng.","D":"Quản lý bản quyền số DRM."},"answer":"B"},{"id":"c1q22","chapter":1,"chapterTitle":"GIỚI THIỆU","number":22,"question":"Kỹ thuật Truy cập bộ nhớ trực tiếp (DMA) có đặc điểm gì?","options":{"A":"CPU phải sao chép từng byte dữ liệu từ thiết bị vào bộ nhớ.","B":"Trình điều khiển thiết bị chuyển khối dữ liệu trực tiếp vào bộ nhớ chính mà không cần sự can thiệp của CPU.","C":"Ngắt xảy ra trên mỗi byte truyền đi.","D":"DMA chỉ được sử dụng cho bộ nhớ thứ cấp."},"answer":"B"},{"id":"c1q23","chapter":1,"chapterTitle":"GIỚI THIỆU","number":23,"question":"DMA sử dụng ngắt (interrupt) dựa trên đơn vị nào?","options":{"A":"Trên mỗi bit.","B":"Trên mỗi byte.","C":"Trên mỗi block (khối dữ liệu).","D":"Không bao giờ sử dụng ngắt."},"answer":"C"},{"id":"c1q24","chapter":1,"chapterTitle":"GIỚI THIỆU","number":24,"question":"Ba lợi ích chính của hệ thống đa xử lý (multiprocessing) là gì?","options":{"A":"Tăng thông lượng, lợi ích kinh tế, tăng độ tin cậy.","B":"Giảm nhiệt độ máy, tăng bảo mật, dễ lập trình.","C":"Chạy được nhiều hệ điều hành, giảm chi phí mạng, giao diện đẹp.","D":"Tăng thời lượng pin, giảm kích thước máy tính, tăng dung lượng RAM."},"answer":"A"},{"id":"c1q25","chapter":1,"chapterTitle":"GIỚI THIỆU","number":25,"question":"Trong kiến trúc đa xử lý đối xứng (Symmetric Multiprocessing), đặc điểm của các vi xử lý là gì?","options":{"A":"Mỗi vi xử lý thực hiện 1 tác vụ cụ thể khác nhau.","B":"Một vi xử lý quản lý tất cả các vi xử lý còn lại.","C":"Mỗi vi xử lý thực hiện tất cả các tác vụ một cách bình đẳng.","D":"Vi xử lý phụ chỉ quản lý bộ nhớ."},"answer":"C"},{"id":"c1q26","chapter":1,"chapterTitle":"GIỚI THIỆU","number":26,"question":"Hệ thống đa xử lý không đối xứng (Asymmetric Multiprocessing) hoạt động ra sao?","options":{"A":"Các vi xử lý đều chạy chung mọi chương trình.","B":"Mỗi vi xử lý thực hiện một tác vụ cụ thể.","C":"Toàn bộ các CPU hoạt động thông qua mạng Internet.","D":"Hệ thống chỉ xử lý dữ liệu vào ban đêm."},"answer":"B"},{"id":"c1q27","chapter":1,"chapterTitle":"GIỚI THIỆU","number":27,"question":"Mạng SAN trong hệ thống máy tính viết tắt của từ gì?","options":{"A":"Storage-Area Network.","B":"System-Area Network.","C":"Secure-Area Network.","D":"Server-Application Network."},"answer":"A"},{"id":"c1q28","chapter":1,"chapterTitle":"GIỚI THIỆU","number":28,"question":"Hệ thống gom cụm đối xứng (Symmetric clustering) hoạt động theo cơ chế nào?","options":{"A":"Có 1 máy ở chế độ tin cậy cao, các máy khác ở chế độ chờ.","B":"Có nhiều máy chạy ứng dụng và theo dõi lẫn nhau.","C":"Các máy trạm gửi toàn bộ dữ liệu về một máy chủ trung tâm.","D":"Các máy tính không dùng chung mạng lưu trữ."},"answer":"B"},{"id":"c1q29","chapter":1,"chapterTitle":"GIỚI THIỆU","number":29,"question":"DLM (Quản lý khóa phân tán) trong hệ thống gom cụm được sử dụng để làm gì?","options":{"A":"Mã hóa dữ liệu trên ổ cứng.","B":"Tránh các hoạt động trái ngược nhau khi nhiều ứng dụng cùng truy cập tài nguyên.","C":"Mở khóa mật khẩu người dùng.","D":"Ngăn chặn virus lây lan trên mạng."},"answer":"B"},{"id":"c1q30","chapter":1,"chapterTitle":"GIỚI THIỆU","number":30,"question":"Mục tiêu của Hệ điều hành đa chương (Batch system/Multiprogramming) là gì?","options":{"A":"Chia đều tài nguyên máy in cho mọi người.","B":"Tổ chức công việc sao cho CPU luôn luôn có 1 công việc để thực hiện.","C":"Cung cấp giao diện đồ họa trực quan.","D":"Chạy các ứng dụng đám mây."},"answer":"B"},{"id":"c1q31","chapter":1,"chapterTitle":"GIỚI THIỆU","number":31,"question":"Hệ thống chia sẻ thời gian (Timesharing) yêu cầu thời gian đáp ứng là bao nhiêu?","options":{"A":"Dưới 1 giây (< 1 giây).","B":"Lớn hơn 5 giây.","C":"Khoảng 1 phút.","D":"Không giới hạn."},"answer":"A"},{"id":"c1q32","chapter":1,"chapterTitle":"GIỚI THIỆU","number":32,"question":"Cơ chế Swapping trong hệ thống chia sẻ thời gian có vai trò gì?","options":{"A":"Xóa vĩnh viễn các tiến trình không cần thiết.","B":"Di chuyển các tiến trình vào trong hoặc ra ngoài bộ nhớ khi bộ nhớ không đủ chỗ.","C":"Chuyển đổi quyền sử dụng CPU giữa các người dùng.","D":"Đổi chế độ từ User sang Kernel."},"answer":"B"},{"id":"c1q33","chapter":1,"chapterTitle":"GIỚI THIỆU","number":33,"question":"Chế độ Dual-mode của hệ điều hành bao gồm 2 chế độ nào?","options":{"A":"Active mode và Sleep mode.","B":"User mode và Kernel mode.","C":"Administrator mode và Guest mode.","D":"Online mode và Offline mode."},"answer":"B"},{"id":"c1q34","chapter":1,"chapterTitle":"GIỚI THIỆU","number":34,"question":"Khi người dùng thực hiện một \"Lời gọi hệ thống\" (System call), bit chế độ (mode bit) thay đổi ra sao?","options":{"A":"Đổi từ Kernel mode (mode bit = 0) sang User mode (mode bit = 1).","B":"Đổi từ User mode (mode bit = 1) sang Kernel mode (mode bit = 0) bằng một bẫy lỗi.","C":"Giữ nguyên là 1.","D":"Đổi thành giá trị nhị phân ngẫu nhiên."},"answer":"B"},{"id":"c1q35","chapter":1,"chapterTitle":"GIỚI THIỆU","number":35,"question":"Sự khác biệt cốt lõi giữa Chương trình (Program) và Tiến trình (Process) là gì?","options":{"A":"Tiến trình là thực thể thụ động, chương trình là thực thể hoạt động.","B":"Chương trình là phần cứng, tiến trình là phần mềm.","C":"Chương trình là một thực thể thụ động, tiến trình là một thực thể hoạt động (chương trình đang thực thi).","D":"Tiến trình được lưu trên đĩa, chương trình thực thi trên RAM."},"answer":"C"},{"id":"c1q36","chapter":1,"chapterTitle":"GIỚI THIỆU","number":36,"question":"Hoạt động nào KHÔNG nằm trong chức năng Quản lý tiến trình của hệ điều hành?","options":{"A":"Tạo và xóa tiến trình.","B":"Tạm ngưng và khôi phục tiến trình.","C":"Phân phối không gian lưu trữ và định vị đĩa cứng.","D":"Cung cấp cơ chế giúp đồng bộ hóa tiến trình."},"answer":"C"},{"id":"c1q37","chapter":1,"chapterTitle":"GIỚI THIỆU","number":37,"question":"Quản lý bộ nhớ (Memory Management) bao gồm các hoạt động nào?","options":{"A":"Tạo và xóa các tập tin trên đĩa.","B":"Theo dõi các phần bộ nhớ đang sử dụng, quyết định tiến trình di chuyển ra/vào bộ nhớ, cấp phát và thu hồi không gian bộ nhớ.","C":"Truyền nhận gói tin qua giao thức TCP/IP.","D":"Điều khiển việc khởi động BIOS."},"answer":"B"},{"id":"c1q38","chapter":1,"chapterTitle":"GIỚI THIỆU","number":38,"question":"Hệ điều hành trừu tượng hóa các thuộc tính vật lý của phương tiện lưu trữ thành đơn vị logic nào?","options":{"A":"Block (Khối).","B":"Sector (Cung từ).","C":"Tập tin (File).","D":"Thư mục (Directory)."},"answer":"C"},{"id":"c1q39","chapter":1,"chapterTitle":"GIỚI THIỆU","number":39,"question":"Hệ thống giới hạn quyền truy cập của tiến trình hoặc người dùng tới tài nguyên máy tính được gọi là gì?","options":{"A":"Mã hóa (Encryption).","B":"Bảo vệ (Protection).","C":"Khôi phục (Recovery).","D":"Định thời (Scheduling)."},"answer":"B"},{"id":"c1q40","chapter":1,"chapterTitle":"GIỚI THIỆU","number":40,"question":"User ID và Group ID dùng để làm gì trong hệ thống bảo vệ và bảo mật?","options":{"A":"Gắn với tiến trình, tập tin để xác định quyền truy cập của từng người dùng và nhóm người dùng.","B":"Để đếm số lượng người sử dụng mạng Internet.","C":"Để chia nhỏ địa chỉ IP.","D":"Để cấp phát dung lượng RAM."},"answer":"A"},{"id":"c1q41","chapter":1,"chapterTitle":"GIỚI THIỆU","number":41,"question":"Trong Cấu trúc dữ liệu nhân hệ điều hành, đặc điểm của \"Cây nhị phân tìm kiếm\" là gì?","options":{"A":"Nút trái luôn lớn hơn nút phải.","B":"Không có nút gốc.","C":"Nút trái <= nút phải.","D":"Các nút liên kết theo vòng tròn."},"answer":"C"},{"id":"c1q42","chapter":1,"chapterTitle":"GIỚI THIỆU","number":42,"question":"Các hệ thống phân tán thường kết nối với nhau thông qua mạng sử dụng giao thức nào?","options":{"A":"HTTP/FTP.","B":"Bluetooth.","C":"TCP/IP.","D":"USB."},"answer":"C"},{"id":"c1q43","chapter":1,"chapterTitle":"GIỚI THIỆU","number":43,"question":"Mô hình môi trường tính toán nào cung cấp một giao diện để Client yêu cầu dịch vụ tính toán hoặc lưu trữ tập tin?","options":{"A":"Peer-to-Peer.","B":"Client-Server.","C":"Real-time embedded system.","D":"Stand-alone."},"answer":"B"},{"id":"c1q44","chapter":1,"chapterTitle":"GIỚI THIỆU","number":44,"question":"Đặc điểm nổi bật của mạng ngang hàng (Peer-to-Peer) như Napster hay Gnutella là gì?","options":{"A":"Có một máy chủ quản lý toàn bộ các client.","B":"Dữ liệu chỉ truyền theo một chiều.","C":"Không phân biệt máy khách và máy chủ, các nút đều bình đẳng và có thể đóng vai trò Client hoặc Server.","D":"Phải sử dụng giao thức truyền thông vô tuyến."},"answer":"C"},{"id":"c1q45","chapter":1,"chapterTitle":"GIỚI THIỆU","number":45,"question":"Ảo hóa (Virtualization) cho phép hệ thống máy tính làm điều gì?","options":{"A":"Tự động sửa chữa phần cứng.","B":"Chạy các ứng dụng trong một hệ điều hành khác bằng cách đóng giả là phần cứng cơ sở.","C":"Chống phân mảnh RAM tự động.","D":"Ngăn chặn triệt để tấn công từ chối dịch vụ."},"answer":"B"},{"id":"c1q46","chapter":1,"chapterTitle":"GIỚI THIỆU","number":46,"question":"Trong điện toán đám mây, dịch vụ nào cung cấp một chương trình ứng dụng chạy thông qua Internet (như hệ thống xử lý văn bản)?","options":{"A":"Public cloud.","B":"SaaS (Software as a Service).","C":"PaaS (Platform as a Service).","D":"IaaS (Infrastructure as a Service)."},"answer":"B"},{"id":"c1q47","chapter":1,"chapterTitle":"GIỚI THIỆU","number":47,"question":"Dịch vụ IaaS (Infrastructure as a Service) trong đám mây cung cấp gì?","options":{"A":"Ứng dụng quản lý nhân sự.","B":"Dịch vụ nền cho nhà phát triển (như Database Server).","C":"Hệ điều hành mã nguồn mở.","D":"Máy chủ hoặc không gian lưu trữ qua Internet."},"answer":"D"},{"id":"c1q48","chapter":1,"chapterTitle":"GIỚI THIỆU","number":48,"question":"Đặc điểm cốt lõi của Hệ điều hành nhúng thời gian thực (Real-time embedded systems) là gì?","options":{"A":"Giao diện đồ họa cảm ứng 3D.","B":"Đòi hỏi khắt khe về thời gian, tiến trình phải hoàn thành với các ràng buộc và chính xác.","C":"Lưu trữ lượng dữ liệu cực kỳ khổng lồ.","D":"Khả năng chạy được mọi ứng dụng Windows."},"answer":"B"},{"id":"c1q49","chapter":1,"chapterTitle":"GIỚI THIỆU","number":49,"question":"Kỹ thuật dùng để bảo vệ quyền sao chép và quản lý bản quyền số trên hệ điều hành nguồn mở/đóng là gì?","options":{"A":"DRM (Digital Rights Management).","B":"TCP/IP.","C":"DLM.","D":"VMM."},"answer":"A"},{"id":"c1q50","chapter":1,"chapterTitle":"GIỚI THIỆU","number":50,"question":"Những phần mềm nào sau đây là ví dụ về công cụ ảo hóa giúp khám phá các hệ điều hành khác nhau?","options":{"A":"Google Chrome và Mozilla Firefox.","B":"Microsoft Word và Excel.","C":"VMware Player và Virtualbox.","D":"iOS và Android."},"answer":"C"},{"id":"c2q1","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":1,"question":"Các dịch vụ của hệ điều hành cung cấp cho người sử dụng KHÔNG bao gồm chức năng nào sau đây?","options":{"A":"Giao diện người dùng (UI)","B":"Thực thi chương trình","C":"Thiết kế mạch phần cứng","D":"Thao tác Nhập/Xuất (I/O)"},"answer":"C"},{"id":"c2q2","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":2,"question":"Trong các dịch vụ hệ điều hành, việc liên lạc (Communication) giữa các tiến trình có thể được thực hiện thông qua những cơ chế nào?","options":{"A":"Bộ nhớ chia sẻ hoặc truyền thông điệp (Message passing)","B":"Gọi hàm trực tiếp từ phần cứng","C":"Giao diện dòng lệnh (CLI)","D":"Qua giao thức HTTP duy nhất"},"answer":"A"},{"id":"c2q3","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":3,"question":"Chức năng \"Tính toán\" (Accounting) trong dịch vụ hệ điều hành dùng để làm gì?","options":{"A":"Tính toán các phép toán số học cho người dùng","B":"Theo dõi người dùng sử dụng bao nhiêu và loại tài nguyên nào","C":"Phân bổ bộ nhớ RAM cho ứng dụng","D":"Kiểm tra lỗi phần cứng"},"answer":"B"},{"id":"c2q4","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":4,"question":"Sự khác biệt giữa \"Bảo vệ\" (Protection) và \"Bảo mật\" (Security) trong hệ điều hành là gì?","options":{"A":"Bảo vệ kiểm soát truy cập tài nguyên bên trong, Bảo mật tránh các nguy cơ tấn công từ bên ngoài","B":"Bảo mật dùng cho phần cứng, Bảo vệ dùng cho phần mềm","C":"Bảo vệ là chức năng của người dùng, Bảo mật là của hệ điều hành","D":"Không có sự khác biệt"},"answer":"A"},{"id":"c2q5","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":5,"question":"Giao diện người dùng CLI là viết tắt của thuật ngữ nào?","options":{"A":"Control-Line Interface","B":"Command-Line Interface","C":"Core-Line Interface","D":"Central-Line Interface"},"answer":"B"},{"id":"c2q6","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":6,"question":"Trên các hệ thống có nhiều bộ dịch lệnh CLI để lựa chọn, các bộ dịch lệnh này được gọi là gì?","options":{"A":"Kernels","B":"APIs","C":"Shells","D":"Daemons"},"answer":"C"},{"id":"c2q7","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":7,"question":"Giao diện màn hình nền (GUI) được phát minh đầu tiên tại đâu?","options":{"A":"Microsoft","B":"Apple","C":"Viện nghiên cứu Xerox PARC","D":"Đại học MIT"},"answer":"C"},{"id":"c2q8","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":8,"question":"Hệ điều hành Apple Mac OS X sử dụng giao diện GUI có tên gọi là gì?","options":{"A":"Aero","B":"Aqua","C":"Metro","D":"GNOME"},"answer":"B"},{"id":"c2q9","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":9,"question":"UNIX và Linux chủ yếu sử dụng giao diện CLI nhưng có tích hợp thêm giao diện GUI tùy chọn nào sau đây?","options":{"A":"CDE, KDE, GNOME","B":"Aqua, Windows","C":"Bourne Shell, Bash","D":"DirectX, OpenGL"},"answer":"A"},{"id":"c2q10","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":10,"question":"Lời gọi hệ thống (System calls) cung cấp giao diện lập trình cho các dịch vụ của HĐH và thường được viết bằng ngôn ngữ nào?","options":{"A":"Java hoặc Python","B":"C hoặc C++","C":"Assembly hoặc Mã máy","D":"HTML hoặc CSS"},"answer":"B"},{"id":"c2q11","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":11,"question":"Ứng dụng thường truy cập lời gọi hệ thống thông qua đâu thay vì gọi trực tiếp?","options":{"A":"Giao diện dòng lệnh (CLI)","B":"Trình điều khiển thiết bị (Device Driver)","C":"Giao diện lập trình ứng dụng cấp cao (API)","D":"Bộ nhớ đệm (Cache)"},"answer":"C"},{"id":"c2q12","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":12,"question":"API nào sau đây KHÔNG nằm trong ba API phổ biến nhất được đề cập trong tài liệu?","options":{"A":"Win32 API","B":"POSIX API","C":"Java API","D":"Android API"},"answer":"D"},{"id":"c2q13","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":13,"question":"Giao diện lời gọi hệ thống (System-call interface) quản lý các lời gọi hệ thống dựa trên thông tin nào?","options":{"A":"Tên của người dùng","B":"Một bảng chỉ mục theo các con số được gắn với mỗi lời gọi hệ thống","C":"Kích thước của tiến trình","D":"Thời gian tạo tiến trình"},"answer":"B"},{"id":"c2q14","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":14,"question":"Khi thực hiện lời gọi hệ thống, người lập trình có cần biết chi tiết về cách lời gọi đó được thực thi trong hệ điều hành không?","options":{"A":"Có, phải biết cấu trúc phần cứng","B":"Có, phải tự viết mã hạt nhân (kernel code)","C":"Không, chỉ cần tuân theo API và hiểu HĐH sẽ trả về kết quả gì","D":"Không, vì HĐH không bao giờ trả về kết quả"},"answer":"C"},{"id":"c2q15","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":15,"question":"Có bao nhiêu phương thức chung được sử dụng để truyền tham số từ ứng dụng tới hệ điều hành trong lời gọi hệ thống?","options":{"A":"1","B":"2","C":"3","D":"4"},"answer":"C"},{"id":"c2q16","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":16,"question":"Phương thức truyền tham số đơn giản nhất trong lời gọi hệ thống là gì?","options":{"A":"Truyền qua Stack","B":"Truyền các tham số vào các thanh ghi","C":"Lưu tham số trong một Block/Table trong bộ nhớ","D":"Truyền qua mạng TCP/IP"},"answer":"B"},{"id":"c2q17","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":17,"question":"Hệ điều hành Linux và Solaris thường sử dụng phương thức truyền tham số nào?","options":{"A":"Truyền tham số vào thanh ghi","B":"Lưu tham số trong một khối (block) hoặc bảng (table) trong bộ nhớ","C":"Đẩy (push) tham số vào ngăn xếp (stack)","D":"Truyền tham số bằng file văn bản"},"answer":"B"},{"id":"c2q18","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":18,"question":"Đặc điểm ưu việt của phương thức truyền tham số bằng Block/Table hoặc Stack so với dùng thanh ghi là gì?","options":{"A":"Tốc độ thực thi luôn nhanh gấp đôi","B":"Không giới hạn số lượng hoặc độ dài của tham số được truyền","C":"Không cần sử dụng bộ nhớ chính","D":"Bảo mật cao hơn trước virus"},"answer":"B"},{"id":"c2q19","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":19,"question":"Lời gọi hệ thống nào sau đây thuộc nhóm \"Điều khiển tiến trình\" (Process Control)?","options":{"A":"Tạo, xóa, mở, đóng tập tin","B":"Tạo tiến trình, kết thúc tiến trình, chờ sự kiện","C":"Nhận và thiết lập thuộc tính thiết bị","D":"Cấp quyền và cấm truy cập"},"answer":"B"},{"id":"c2q20","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":20,"question":"Trong hệ điều hành Windows, lời gọi hệ thống để tạo một tiến trình mới là gì?","options":{"A":"fork()","B":"CreateProcess()","C":"newProcess()","D":"StartProcess()"},"answer":"B"},{"id":"c2q21","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":21,"question":"Trong hệ điều hành Unix, lời gọi hệ thống nào tương đương với chức năng tạo tiến trình mới?","options":{"A":"CreateProcess()","B":"wait()","C":"fork()","D":"exec()"},"answer":"C"},{"id":"c2q22","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":22,"question":"Hàm printf() trong thư viện C chuẩn khi chạy ở chế độ người dùng (User mode) sẽ thực hiện lời gọi hệ thống nào ở chế độ nhân (Kernel mode)?","options":{"A":"read()","B":"write()","C":"open()","D":"print()"},"answer":"B"},{"id":"c2q23","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":23,"question":"MS-DOS là một ví dụ về loại hệ điều hành nào?","options":{"A":"Hệ điều hành đa nhiệm","B":"Hệ điều hành đơn nhiệm","C":"Hệ điều hành thời gian thực","D":"Hệ điều hành phân tán"},"answer":"B"},{"id":"c2q24","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":24,"question":"Đặc điểm nào sau đây mô tả đúng quá trình thực thi chương trình trong MS- DOS?","options":{"A":"Tạo nhiều tiến trình chạy song song cùng lúc","B":"Tải chương trình vào bộ nhớ, ghi đè lên tất cả trừ hạt nhân (Kernel)","C":"Phân chia bộ nhớ thành hàng ngàn lớp an toàn","D":"Không cần khởi động Shell"},"answer":"B"},{"id":"c2q25","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":25,"question":"Trong hệ điều hành FreeBSD (Unix), sau khi shell tạo tiến trình bằng hàm fork(), nó sử dụng lệnh nào để nạp chương trình vào tiến trình?","options":{"A":"load()","B":"run()","C":"exec()","D":"start()"},"answer":"C"},{"id":"c2q26","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":26,"question":"Trình biên dịch (compiler) và trình gỡ rối (debugger) được phân loại là gì trong hệ thống?","options":{"A":"Lời gọi hệ thống (System calls)","B":"Chương trình ứng dụng (Application programs)","C":"Chương trình hệ thống (System programs) nhóm Ngôn ngữ lập trình","D":"Hệ thống tập tin (File System)"},"answer":"C"},{"id":"c2q27","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":27,"question":"Registry trong một số hệ điều hành là đối tượng được sử dụng để làm gì?","options":{"A":"Lưu trữ mã nguồn mở","B":"Lưu trữ và lấy thông tin cấu hình của hệ thống","C":"Kết nối Internet tự động","D":"Nén các tập tin lớn"},"answer":"B"},{"id":"c2q28","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":28,"question":"Các dịch vụ nền (Daemons) có đặc điểm nào sau đây?","options":{"A":"Chỉ chạy một lần duy nhất lúc cài đặt máy","B":"Chạy trong chế độ hạt nhân (Kernel mode)","C":"Cung cấp tiện ích như in ấn, điều phối tiến trình và chạy trong chế độ người dùng (User mode)","D":"Được coi là một phần cốt lõi của hạt nhân HĐH"},"answer":"C"},{"id":"c2q29","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":29,"question":"Chương trình ứng dụng (như trình duyệt web, phần mềm soạn thảo) có đặc điểm nào sau đây?","options":{"A":"Là một phần của hệ điều hành","B":"Chạy trong chế độ hạt nhân (Kernel mode)","C":"Do người dùng khởi động và không được coi là một phần của hệ điều hành","D":"Luôn chạy tự động khi bật máy tính"},"answer":"C"},{"id":"c2q30","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":30,"question":"Trong thiết kế hệ điều hành, \"Hệ điều hành nên thuận tiện sử dụng, dễ học, an toàn, nhanh chóng\" thuộc về mục tiêu nào?","options":{"A":"System goals (Mục tiêu hệ thống)","B":"User goals (Mục tiêu người dùng)","C":"Hardware goals (Mục tiêu phần cứng)","D":"Network goals (Mục tiêu mạng)"},"answer":"B"},{"id":"c2q31","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":31,"question":"Khái niệm \"Chính sách\" (Policy) trong nguyên lý thiết kế hệ điều hành trả lời cho câu hỏi nào?","options":{"A":"Sẽ làm những gì? (WHAT)","B":"Làm chúng như thế nào? (HOW)","C":"Khi nào sẽ làm? (WHEN)","D":"Ai sẽ làm? (WHO)"},"answer":"A"},{"id":"c2q32","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":32,"question":"Khái niệm \"Cơ chế\" (Mechanism) trong nguyên lý thiết kế HĐH nhằm xác định điều gì?","options":{"A":"Sẽ làm những gì?","B":"Làm chúng như thế nào? (Xác định cách thức thực hiện)","C":"Phân quyền cho ai?","D":"Khi nào bảo trì?"},"answer":"B"},{"id":"c2q33","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":33,"question":"Tách rời chính sách (Policy) khỏi cơ chế (Mechanism) mang lại lợi ích gì?","options":{"A":"Tăng dung lượng bộ nhớ","B":"Giảm bớt số lượng ngôn ngữ lập trình","C":"Cho phép linh hoạt tối đa nếu các quyết định chính sách bị thay đổi","D":"Buộc hệ điều hành phải chạy chậm lại"},"answer":"C"},{"id":"c2q34","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":34,"question":"Phần thân chính của các hệ điều hành hiện nay thường được viết bằng ngôn ngữ nào?","options":{"A":"Assembly thuần túy","B":"C, C++","C":"Java, C#","D":"HTML, Javascript"},"answer":"B"},{"id":"c2q35","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":35,"question":"Emulator (Trình giả lập) trong hệ điều hành có tác dụng gì?","options":{"A":"Diệt virus hệ thống","B":"Cho phép HĐH chạy trên phần cứng non-native (phần cứng không phải bản địa)","C":"Tăng tốc độ truy xuất ổ cứng","D":"Giảm nhiệt độ của CPU"},"answer":"B"},{"id":"c2q36","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":36,"question":"MS-DOS được thiết kế theo cấu trúc hệ điều hành nào?","options":{"A":"Cấu trúc Microkernel","B":"Cấu trúc đơn giản (chưa phân cấp rõ ràng)","C":"Cấu trúc Module hóa","D":"Cấu trúc phân lớp hoàn toàn"},"answer":"B"},{"id":"c2q37","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":37,"question":"Hệ điều hành UNIX gốc có cấu trúc bao gồm 2 phần riêng biệt là gì?","options":{"A":"Shell và GUI","B":"RAM và ROM","C":"Chương trình hệ thống và Nhân (Kernel)","D":"Microkernel và Module"},"answer":"C"},{"id":"c2q38","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":38,"question":"Trong phương pháp tiếp cận phân lớp (Layered approach) của hệ điều hành, lớp dưới cùng (Layer 0) là gì?","options":{"A":"Giao diện người dùng","B":"Ứng dụng","C":"Phần cứng","D":"Lời gọi hệ thống"},"answer":"C"},{"id":"c2q39","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":39,"question":"Trong cấu trúc phân lớp HĐH, nguyên tắc hoạt động giữa các lớp là gì?","options":{"A":"Lớp trên có quyền truy cập trực tiếp vào phần cứng","B":"Mọi lớp đều gọi lẫn nhau tự do","C":"Mỗi lớp chỉ sử dụng các dịch vụ và chức năng của lớp thấp hơn","D":"Lớp thấp hơn sử dụng dịch vụ của lớp cao hơn"},"answer":"C"},{"id":"c2q40","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":40,"question":"Hệ điều hành Mach là ví dụ tiêu biểu cho cấu trúc hệ điều hành nào?","options":{"A":"Monolithic (Nguyên khối)","B":"Cấu trúc Microkernel","C":"Cấu trúc đơn giản","D":"Cấu trúc mạng"},"answer":"B"},{"id":"c2q41","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":41,"question":"Lợi ích của cấu trúc Microkernel là gì?","options":{"A":"Chạy các ứng dụng MS-DOS","B":"Gộp chung tất cả các dịch vụ vào nhân để tăng tốc độ tối đa","C":"Dễ dàng mở rộng, đáng tin cậy hơn, an toàn hơn do ít mã lệnh chạy trong kernel mode","D":"Cho phép người dùng chỉnh sửa phần cứng"},"answer":"C"},{"id":"c2q42","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":42,"question":"Hạn chế lớn nhất của cấu trúc Microkernel là gì?","options":{"A":"Quá trình liên lạc (message passing) từ chế độ người dùng sang chế độ nhân làm tốn hiệu suất cao","B":"Không hỗ trợ mạng","C":"Rất khó để lập trình","D":"Chỉ chạy được trên máy Mac"},"answer":"A"},{"id":"c2q43","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":43,"question":"Cấu trúc Module của hệ điều hành sử dụng cách tiếp cận lập trình nào?","options":{"A":"Tiếp cận tuần tự","B":"Tiếp cận hướng đối tượng","C":"Tiếp cận kịch bản (Scripting)","D":"Tiếp cận đệ quy"},"answer":"B"},{"id":"c2q44","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":44,"question":"Hệ điều hành Solaris của Sun Microsystems (cũ) được thiết kế theo cấu trúc nào?","options":{"A":"Đơn giản giống DOS","B":"Module hóa hạt nhân","C":"Phân lớp thuần túy","D":"Microkernel thuần túy"},"answer":"B"},{"id":"c2q45","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":45,"question":"Các hệ điều hành hiện đại như Windows, Linux, Mac OS X thường sử dụng mô hình cấu trúc nào?","options":{"A":"Mô hình lai (Hybrid - kết hợp nhiều hướng tiếp cận)","B":"Mô hình đơn giản","C":"Mô hình phân lớp thuần túy","D":"Mô hình Microkernel nguyên bản"},"answer":"A"},{"id":"c2q46","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":46,"question":"Apple Mac OS X là một hệ thống lai bao gồm những thành phần môi trường nào?","options":{"A":"Windows API và MS-DOS","B":"Giao diện người dùng Aqua, môi trường lập trình Cocoa và Kernel Mach/BSD","C":"Kernel Linux và GUI KDE","D":"Dalvik Virtual Machine"},"answer":"B"},{"id":"c2q47","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":47,"question":"Hệ điều hành di động iOS sử dụng API nào để phát triển các ứng dụng?","options":{"A":"Java API","B":"POSIX","C":"Cocoa Touch (Objective-C API)","D":"Win32"},"answer":"C"},{"id":"c2q48","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":48,"question":"Hệ điều hành Android dựa trên nhân (kernel) của hệ điều hành nào?","options":{"A":"Unix","B":"Mac OS X","C":"Linux","D":"Windows CE"},"answer":"C"},{"id":"c2q49","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":49,"question":"Môi trường thời gian chạy (Runtime Environment) của hệ điều hành Android bao gồm bộ thư viện lõi và thành phần nào?","options":{"A":"Trình giả lập DOS","B":"Máy ảo Dalvik (Dalvik virtual machine)","C":"Trình biên dịch C++","D":"Môi trường Aqua"},"answer":"B"},{"id":"c2q50","chapter":2,"chapterTitle":"CẤU TRÚC HỆ ĐIỀU HÀNH","number":50,"question":"Ứng dụng trên nền tảng Android chủ yếu được phát triển bằng ngôn ngữ lập trình nào cộng với API của Android?","options":{"A":"C#","B":"Swift","C":"Java","D":"Python"},"answer":"C"},{"id":"c3q1","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":1,"question":"Sự khác biệt cơ bản giữa chương trình và tiến trình là gì?","options":{"A":"Chương trình chạy trên RAM, tiến trình lưu trên đĩa cứng","B":"Chương trình là thực thể thụ động, tiến trình là thực thể hoạt động","C":"Tiến trình chứa mã nguồn chưa biên dịch, chương trình chứa mã máy","D":"Không có sự khác biệt nào"},"answer":"B"},{"id":"c3q2","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":2,"question":"Một tiến trình bao gồm những thành phần nào trong bộ nhớ?","options":{"A":"Text, Data, Heap, Stack","B":"Text, Thread, Network, RAM","C":"Program, Hardware, Memory, Disk","D":"Heap, Cache, Registers, ALU"},"answer":"A"},{"id":"c3q3","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":3,"question":"Trong cấu trúc bộ nhớ của tiến trình, ngăn xếp (Stack) dùng để làm gì?","options":{"A":"Lưu trữ mã chương trình","B":"Chứa bộ nhớ cấp phát động","C":"Chứa biến toàn cục","D":"Chứa dữ liệu tạm (tham số, địa chỉ, biến cục bộ)"},"answer":"D"},{"id":"c3q4","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":4,"question":"Phần Khối xếp (Heap) của tiến trình có chức năng gì?","options":{"A":"Lưu trữ bộ đếm chương trình","B":"Chứa bộ nhớ cấp phát động trong suốt thời gian chạy","C":"Chứa dữ liệu tĩnh","D":"Chứa thông tin đăng nhập của người dùng"},"answer":"B"},{"id":"c3q5","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":5,"question":"Khi tiến trình đang chờ một số sự kiện xảy ra (như hoàn thành Nhập/Xuất), nó ở trạng thái nào?","options":{"A":"Ready","B":"Running","C":"Waiting","D":"New"},"answer":"C"},{"id":"c3q6","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":6,"question":"Trạng thái Ready (Sẵn sàng) của tiến trình có nghĩa là gì?","options":{"A":"Tiến trình đang chờ nhận bộ xử lý (CPU)","B":"Tập lệnh của tiến trình đang được thực thi","C":"Tiến trình đang được tạo ra","D":"Tiến trình đã hoàn thành việc thực thi"},"answer":"A"},{"id":"c3q7","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":7,"question":"Khối điều khiển tiến trình (PCB - Process Control Block) KHÔNG chứa thông tin nào sau đây?","options":{"A":"Bộ đếm chương trình","B":"Thông tin quản lý bộ nhớ","C":"Thông định thời CPU","D":"Dữ liệu bộ nhớ đệm (Cache) của các thiết bị I/O của máy tính khác"},"answer":"D"},{"id":"c3q8","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":8,"question":"Thông tin định thời CPU trong PCB bao gồm những gì?","options":{"A":"Số lượng tiến trình con","B":"Độ ưu tiên, con trỏ hàng đợi","C":"Giới hạn thời gian dùng RAM","D":"Danh sách các tập tin đang mở"},"answer":"B"},{"id":"c3q9","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":9,"question":"Hệ điều hành Linux biểu diễn tiến trình bằng cấu trúc ngôn ngữ C nào?","options":{"A":"process_struct","B":"task_struct","C":"pcb_struct","D":"thread_struct"},"answer":"B"},{"id":"c3q10","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":10,"question":"Tập hợp tất cả các tiến trình đang có trong hệ thống được gọi là hàng đợi nào?","options":{"A":"Ready queue","B":"Device queue","C":"Job queue","D":"Wait queue"},"answer":"C"},{"id":"c3q11","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":11,"question":"Ready queue (hàng đợi sẵn sàng) chứa các tiến trình như thế nào?","options":{"A":"Đang nằm trên đĩa từ chờ được nạp","B":"Đang ở trong bộ nhớ chính, sẵn sàng và chờ thực thi","C":"Đang chờ một thiết bị I/O","D":"Vừa mới hoàn thành thực thi"},"answer":"B"},{"id":"c3q12","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":12,"question":"Nhiệm vụ của Bộ định thời ngắn hạn (Short-term Scheduler) là gì?","options":{"A":"Chọn tiến trình được đưa vào ready queue","B":"Chọn tiến trình sẽ được thực thi tiếp theo và cấp phát CPU","C":"Đưa tiến trình từ đĩa vào bộ nhớ","D":"Kiểm soát mức độ đa chương"},"answer":"B"},{"id":"c3q13","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":13,"question":"Đặc điểm của Bộ định thời dài hạn (Long-term Scheduler) là gì?","options":{"A":"Được gọi thường xuyên mỗi mili giây","B":"Thực hiện hoán đổi (swapping) tiến trình","C":"Chọn tiến trình đưa vào ready queue và kiểm soát mức độ đa chương","D":"Phân bổ phần cứng thiết bị I/O"},"answer":"C"},{"id":"c3q14","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":14,"question":"Tiến trình thiên hướng xử lý (CPU-bound process) có đặc điểm gì?","options":{"A":"Tốn nhiều thời gian cho Nhập/Xuất","B":"Có nhiều phiên sử dụng CPU ngắn","C":"Tốn nhiều thời gian cho việc tính toán, có vài phiên sử dụng CPU dài","D":"Không bao giờ vào trạng thái Waiting"},"answer":"C"},{"id":"c3q15","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":15,"question":"Chức năng của Bộ định thời trung hạn (Medium-term Scheduler) là gì?","options":{"A":"Di chuyển tiến trình từ bộ nhớ ra đĩa và ngược lại (swapping) để giảm mức độ đa chương","B":"Gấp rút cấp phát CPU","C":"Quản lý hệ thống file","D":"Tính toán thời gian phản hồi mạng"},"answer":"A"},{"id":"c3q16","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":16,"question":"Khi CPU chuyển sang một tiến trình khác, hệ thống thực hiện thao tác lưu trạng thái tiến trình cũ và tải trạng thái tiến trình mới. Quá trình này gọi là gì?","options":{"A":"Cấp phát động (Dynamic Allocation)","B":"Chuyển ngữ cảnh (Context switch)","C":"Phân đoạn bộ nhớ (Segmentation)","D":"Đa luồng (Multithreading)"},"answer":"B"},{"id":"c3q17","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":17,"question":"Trong quá trình chuyển ngữ cảnh (context switch), hệ thống có thực hiện công việc hữu ích nào cho các ứng dụng không?","options":{"A":"Có, nó tự động dọn rác bộ nhớ","B":"Có, nó tải trước dữ liệu mạng","C":"Không, hệ thống không có công việc hữu ích trong khi chuyển","D":"Có, nó thực hiện sao lưu đĩa"},"answer":"C"},{"id":"c3q18","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":18,"question":"Yếu tố nào giúp làm giảm thời gian chuyển ngữ cảnh ở mức phần cứng?","options":{"A":"CPU có tốc độ xung nhịp cực lớn","B":"Hỗ trợ nhiều tập thanh ghi (registers) trên CPU để tải nhiều ngữ cảnh cùng lúc","C":"Ổ cứng SSD tốc độ cao","D":"Dung lượng RAM cực lớn"},"answer":"B"},{"id":"c3q19","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":19,"question":"Mỗi tiến trình được hệ điều hành xác định và quản lý thông qua mã nào?","options":{"A":"Mã định danh người dùng (UID)","B":"Mã định danh tiến trình (PID - process identifier)","C":"Số hiệu cổng (Port)","D":"Địa chỉ MAC"},"answer":"B"},{"id":"c3q20","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":20,"question":"Trong hệ điều hành UNIX, lời gọi hệ thống nào được sử dụng để tạo một tiến trình con mới?","options":{"A":"CreateProcess()","B":"exec()","C":"fork()","D":"new()"},"answer":"C"},{"id":"c3q21","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":21,"question":"Sau lời gọi fork() trong UNIX, lời gọi hệ thống exec() thường được dùng để làm gì?","options":{"A":"Hủy tiến trình","B":"Chờ tiến trình con kết thúc","C":"Thay thế không gian bộ nhớ của tiến trình bằng một chương trình mới","D":"Trả về mã PID của tiến trình cha"},"answer":"C"},{"id":"c3q22","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":22,"question":"Windows API sử dụng hàm nào để tạo một tiến trình mới?","options":{"A":"fork()","B":"CreateProcess()","C":"spawn()","D":"StartThread()"},"answer":"B"},{"id":"c3q23","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":23,"question":"Tiến trình thực thi câu lệnh cuối cùng và yêu cầu HĐH xóa nó bằng lời gọi hệ thống nào?","options":{"A":"abort()","B":"terminate()","C":"exit()","D":"kill()"},"answer":"C"},{"id":"c3q24","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":24,"question":"Tiến trình cha kết thúc tiến trình con bằng lời gọi abort() khi nào?","options":{"A":"Tiến trình con sử dụng vượt mức tài nguyên cấp phát","B":"Tác vụ giao cho con không còn cần thiết","C":"Tiến trình cha kết thúc và HĐH không cho phép tiến trình con tiếp tục","D":"Tất cả các lý do trên"},"answer":"D"},{"id":"c3q25","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":25,"question":"\"Kết thúc theo tầng\" (Cascading termination) có nghĩa là gì?","options":{"A":"CPU kết thúc từng tiến trình theo độ ưu tiên","B":"Nếu tiến trình cha kết thúc, mọi tiến trình con, cháu của nó cũng phải kết thúc","C":"Đóng các tập tin theo thứ tự từ trên xuống","D":"Tắt từng thiết bị I/O"},"answer":"B"},{"id":"c3q26","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":26,"question":"Tiến trình Zombie là loại tiến trình như thế nào?","options":{"A":"Tiến trình đã kết thúc nhưng tiến trình cha của nó chưa gọi lời gọi wait()","B":"Tiến trình đang giữ tài nguyên của hệ thống mà không nhả ra","C":"Tiến trình đang lây nhiễm virus","D":"Tiến trình cha kết thúc mà không gọi wait()"},"answer":"A"},{"id":"c3q27","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":27,"question":"Tiến trình Orphan (mồ côi) xuất hiện khi nào?","options":{"A":"Tiến trình con kết thúc trước tiến trình cha","B":"Tiến trình cha kết thúc mà không gọi wait()","C":"Cả hai tiến trình đều chạy vô hạn","D":"Bộ nhớ bị đầy"},"answer":"B"},{"id":"c3q28","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":28,"question":"Trình duyệt web Google Chrome hoạt động dựa trên kiến trúc nào?","options":{"A":"Đơn tiến trình","B":"Đa tiến trình (Multi-process)","C":"Chỉ sử dụng 1 luồng duy nhất (Single-thread)","D":"Dựa vào BIOS"},"answer":"B"},{"id":"c3q29","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":29,"question":"Trong kiến trúc đa tiến trình của Chrome, tiến trình Renderer có nhiệm vụ gì?","options":{"A":"Quản lý giao diện đĩa và nhập/xuất","B":"Quản lý plug-in","C":"Trình diễn trang web, xử lý HTML, Javascript","D":"Tải xuống file cài đặt"},"answer":"C"},{"id":"c3q30","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":30,"question":"Tại sao các tiến trình lại cần cộng tác với nhau?","options":{"A":"Để chiếm dụng nhiều RAM hơn","B":"Tránh bị diệt bởi HĐH","C":"Chia sẻ thông tin, tăng tốc độ tính toán, đơn thể hóa, tạo sự thuận tiện","D":"Để bỏ qua bộ định thời CPU"},"answer":"C"},{"id":"c3q31","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":31,"question":"Có 2 mô hình Truyền thông liên tiến trình (IPC) cơ bản là gì?","options":{"A":"Semaphore và Mutex","B":"Bộ nhớ chia sẻ (Shared memory) và Trao đổi thông điệp (Message passing)","C":"TCP/IP và UDP","D":"RAM và ROM"},"answer":"B"},{"id":"c3q32","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":32,"question":"Bài toán Producer-Consumer theo kiểu Vùng đệm giới hạn (Bounded-buffer) có đặc điểm gì?","options":{"A":"Kích thước vùng đệm được gán cố định","B":"Không giới hạn kích thước vùng đệm","C":"Chỉ có 1 phần tử duy nhất","D":"Dữ liệu không bao giờ bị tràn"},"answer":"A"},{"id":"c3q33","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":33,"question":"(Bài tập Code/Logic) Trong giải pháp bộ nhớ chia sẻ Bounded-buffer với kích thước BUFFER_SIZE, câu lệnh kiểm tra vùng đệm ĐẦY là gì?","options":{"A":"in == out","B":"in == BUFFER_SIZE","C":"((in + 1) % BUFFER_SIZE) == out","D":"(out + 1) == in"},"answer":"C"},{"id":"c3q34","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":34,"question":"(Bài tập Code/Logic) Trong Bounded-buffer, điều kiện để Consumer kiểm tra vùng đệm RỖNG là gì?","options":{"A":"((in + 1) % BUFFER_SIZE) == out","B":"in == out","C":"in == 0","D":"out == BUFFER_SIZE"},"answer":"B"},{"id":"c3q35","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":35,"question":"Hạn chế của giải pháp Bounded-buffer sử dụng công thức (in + 1) % BUFFER_SIZE là gì?","options":{"A":"Mất nhiều thời gian tính toán","B":"Gây treo máy tính","C":"Chỉ có thể sử dụng tối đa (BUFFER_SIZE - 1) phần tử cùng lúc","D":"Phải cấp quyền quản trị viên"},"answer":"C"},{"id":"c3q36","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":36,"question":"Cơ chế IPC \"Trao đổi thông điệp\" (Message Passing) cung cấp 2 hoạt động chính nào?","options":{"A":"Read và Write","B":"Send(message) và Receive(message)","C":"Load và Store","D":"Push và Pop"},"answer":"B"},{"id":"c3q37","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":37,"question":"Trong truyền thông trực tiếp, lệnh Send(P, message) có nghĩa là gì?","options":{"A":"Gửi thông báo lỗi","B":"Phát broadcast lên toàn mạng","C":"Gửi thông điệp tới tiến trình P","D":"P gửi thông điệp cho hệ thống"},"answer":"C"},{"id":"c3q38","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":38,"question":"Truyền thông gián tiếp (Indirect communication) sử dụng thành phần trung gian nào để gửi/nhận thông điệp?","options":{"A":"Thanh ghi (Registers)","B":"Bộ nhớ ảo (Virtual Memory)","C":"Hộp thư (Mailboxes / Ports)","D":"Cáp mạng"},"answer":"C"},{"id":"c3q39","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":39,"question":"Thuộc tính liên kết của Truyền thông gián tiếp có đặc điểm gì?","options":{"A":"Giữa hai tiến trình chỉ có tối đa 1 liên kết","B":"Một liên kết có thể được gắn với nhiều tiến trình","C":"Không cho phép gửi hai chiều","D":"Không cần thiết lập liên kết"},"answer":"B"},{"id":"c3q40","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":40,"question":"Nếu 3 tiến trình P1, P2, P3 chia sẻ hộp thư chung, khi P1 gửi thông điệp, hệ thống giải quyết việc ai là người nhận bằng cách nào?","options":{"A":"Gửi cho tất cả cùng lúc","B":"Chỉ cho phép liên kết gắn đúng 2 tiến trình, hoặc cho phép 1 tiến trình nhận tại 1 thời điểm, hoặc chọn ngẫu nhiên","C":"Xóa thông điệp nếu có hơn 1 người nhận","D":"Yêu cầu P1 chia nhỏ gói tin"},"answer":"B"},{"id":"c3q41","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":41,"question":"Khái niệm \"Blocking send\" trong đồng bộ hóa thông điệp có nghĩa là gì?","options":{"A":"Tiến trình gửi chạy vô hạn","B":"Tiến trình gửi bị khóa (chờ) cho đến khi thông điệp của nó được nhận","C":"Khóa hệ điều hành để gửi tin","D":"Gửi liên tục không cần biết đầu nhận"},"answer":"B"},{"id":"c3q42","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":42,"question":"\"Non-blocking receive\" (nhận không đồng bộ) xảy ra như thế nào?","options":{"A":"Tiến trình nhận bị treo máy","B":"Tiến trình nhận bị khóa tới khi có thông điệp","C":"Tiến trình nhận một thông điệp hợp lệ hoặc một thông điệp rỗng (null) và tiếp tục thực thi ngay","D":"Bỏ qua tất cả thông điệp"},"answer":"C"},{"id":"c3q43","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":43,"question":"Khi hàng đợi thông điệp có cấu hình \"Zero capacity\" (không có vùng đệm), điều gì sẽ xảy ra?","options":{"A":"Thông điệp bị xóa ngay lập tức","B":"Tiến trình gửi luôn bị khóa, phải chờ cho đến khi tiến trình nhận sẵn sàng nhận (rendezvous)","C":"Gửi không bao giờ phải chờ","D":"Chỉ cho phép thông điệp dung lượng 0 byte"},"answer":"B"},{"id":"c3q44","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":44,"question":"Hàng đợi thông điệp \"Unbounded capacity\" (không giới hạn độ dài) mang lại ưu điểm gì cho tiến trình gửi?","options":{"A":"Tiến trình gửi không bao giờ phải chờ (không bị khóa)","B":"Đảm bảo bảo mật 100%","C":"Chỉ tốn 1 byte RAM","D":"Bắt buộc người nhận phải đọc ngay"},"answer":"A"},{"id":"c3q45","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":45,"question":"(Bài tập Mô hình) Trong mô hình 7 trạng thái của tiến trình, trạng thái nào được bổ sung so với mô hình 5 trạng thái?","options":{"A":"New, Terminated","B":"Ready, Waiting","C":"Suspended ready, Suspended blocked","D":"Running, Blocked"},"answer":"C"},{"id":"c3q46","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":46,"question":"(Bài tập Mô hình) Trong mô hình 7 trạng thái, một tiến trình chuyển từ Running (Đang chạy) sang Suspended ready (Sẵn sàng bị treo) khi nào?","options":{"A":"Khi có lỗi phần cứng","B":"Thời gian cấp phát CPU đã hết nhưng bộ nhớ KHÔNG CÒN chỗ trống, HĐH phải đẩy tiến trình ra","C":"Khi người dùng nhấn nút Tắt máy","D":"Khi nó chờ thiết bị I/O"},"answer":"B"},{"id":"c3q47","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":47,"question":"(Bài tập Mô hình) Khi một tiến trình đang ở trạng thái Blocked (Khóa/Đợi sự kiện) và bộ nhớ chính bị đầy, HĐH sẽ chuyển nó sang trạng thái nào để giải phóng RAM?","options":{"A":"Terminated (Kết thúc)","B":"Running (Đang chạy)","C":"Suspended blocked (Bị treo ở trạng thái khóa)","D":"Ready (Sẵn sàng)"},"answer":"C"},{"id":"c3q48","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":48,"question":"(Bài tập Mô hình) Khi sự kiện Nhập/Xuất mà tiến trình đang đợi đã xuất hiện, nhưng tiến trình đang nằm ngoài đĩa ở trạng thái \"Suspended blocked\", nó sẽ chuyển sang trạng thái nào tiếp theo?","options":{"A":"Suspended ready","B":"Blocked","C":"Running","D":"Terminated"},"answer":"A"},{"id":"c3q49","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":49,"question":"Lời gọi hệ thống wait(&status) của tiến trình cha thực hiện tác vụ gì?","options":{"A":"Buộc hệ thống tạm dừng toàn bộ CPU","B":"Khởi động lại hệ điều hành","C":"Chờ tiến trình con kết thúc, trả về trạng thái thông tin và mã PID của tiến trình con đã kết thúc","D":"Hủy ngay lập tức tiến trình con"},"answer":"C"},{"id":"c3q50","chapter":3,"chapterTitle":"TIẾN TRÌNH","number":50,"question":"Nhược điểm của việc có quá nhiều luồng (threads/processes) chạy đồng thời mà thiết kế HĐH và PCB phức tạp là gì?","options":{"A":"Làm CPU bị hỏng vật lý","B":"Không thể sử dụng bàn phím","C":"Tốn chi phí quản lý rất lớn do thời gian chuyển ngữ cảnh (context switch) diễn ra lâu","D":"Gây ra hiện tượng cháy RAM"},"answer":"C"},{"id":"c4q1","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":1,"question":"Tiểu trình (Thread) được định nghĩa là gì?","options":{"A":"Một hệ quản trị cơ sở dữ liệu","B":"Đơn vị cơ bản sử dụng CPU (còn gọi là tiến trình nhỏ - lightweight process)","C":"Một bộ nhớ đệm ẩn trong nhân","D":"Một loại bẫy lỗi phần cứng"},"answer":"B"},{"id":"c4q2","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":2,"question":"Một tiểu trình bao gồm những thành phần cơ bản nào?","options":{"A":"Mã định danh ID, Bộ đếm chương trình (PC), Tập thanh ghi, Ngăn xếp","B":"Bộ nhớ ảo, Card mạng, Ổ cứng","C":"Cấu trúc thư mục, Bảng trang, Con trỏ tập tin","D":"Ngăn xếp, Hàng đợi, Cây nhị phân"},"answer":"A"},{"id":"c4q3","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":3,"question":"Đâu KHÔNG phải là một lợi ích của việc sử dụng đa tiểu trình so với đa tiến trình?","options":{"A":"Tính kinh tế cao hơn do chi phí chuyển ngữ cảnh thấp hơn","B":"Khả năng chia sẻ tài nguyên dễ dàng hơn","C":"Đảm bảo bảo mật tuyệt đối cho mọi dữ liệu người dùng","D":"Khả năng đáp ứng tốt hơn, đặc biệt với giao diện người dùng"},"answer":"C"},{"id":"c4q4","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":4,"question":"Lợi ích \"Tính kinh tế\" của tiểu trình thể hiện ở điểm nào?","options":{"A":"Tốn ít điện năng của CPU hơn","B":"Ít tốn kém hơn so với việc tạo tiến trình, chi phí chuyển ngữ cảnh của tiểu trình thấp hơn chuyển ngữ cảnh của tiến trình","C":"Không cần sử dụng RAM","D":"Tự động nén dữ liệu truyền qua mạng"},"answer":"B"},{"id":"c4q5","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":5,"question":"Trong lập trình đa lõi, thách thức nào sau đây đòi hỏi lập trình viên phải giải quyết?","options":{"A":"Cập nhật driver màn hình","B":"Chia nhỏ hoạt động, Cân bằng, Tách dữ liệu, Phụ thuộc dữ liệu, Kiểm tra và gỡ lỗi","C":"Quản lý điện năng tiêu thụ của lõi CPU","D":"Thiết kế giao diện đồ họa"},"answer":"B"},{"id":"c4q6","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":6,"question":"\"Song song dữ liệu\" (Data parallelism) được hiểu là:","options":{"A":"Phân phối các tiểu trình đến các lõi, mỗi tiểu trình làm 1 thao tác duy nhất","B":"Sử dụng một dữ liệu chung cho tất cả các tiến trình","C":"Phân tán các tập con của dữ liệu ban đầu đến nhiều lõi, các thao tác thực hiện tương tự trên mỗi lõi","D":"Lưu dữ liệu song song ra 2 đĩa cứng"},"answer":"C"},{"id":"c4q7","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":7,"question":"Khái niệm \"Song song tác vụ\" (Task parallelism) có nghĩa là gì?","options":{"A":"Chạy cùng lúc một chương trình trên nhiều máy tính","B":"Phân phối các tiểu trình đến các lõi, mỗi tiểu trình thực hiện thao tác duy nhất","C":"Cùng một tác vụ thực hiện trên nhiều dữ liệu khác nhau","D":"Phân tán các tập con của dữ liệu đến nhiều lõi"},"answer":"B"},{"id":"c4q8","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":8,"question":"Trên hệ thống đơn lõi (single-core system), bộ định thời cung cấp hình thức xử lý nào?","options":{"A":"Xử lý song song tuyệt đối","B":"Xử lý phân tán","C":"Xử lý đồng thời (Concurrency)","D":"Gom cụm đối xứng"},"answer":"C"},{"id":"c4q9","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":9,"question":"Tiểu trình người dùng (User threads) được quản lý bởi thành phần nào?","options":{"A":"Quản lý trực tiếp bởi Phần cứng CPU","B":"Quản lý bởi Thư viện tiểu trình ở mức người dùng","C":"Quản lý bởi hệ thống tệp tin của Kernel","D":"Quản lý bởi bộ điều khiển mạng"},"answer":"B"},{"id":"c4q10","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":10,"question":"Tiểu trình nhân (Kernel threads) có đặc điểm gì?","options":{"A":"Chỉ chạy trên hệ điều hành MS-DOS","B":"Được hỗ trợ và quản lý trực tiếp bởi Hệ điều hành","C":"Không tốn chi phí hệ thống","D":"Không cần mã định danh ID"},"answer":"B"},{"id":"c4q11","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":11,"question":"Ba thư viện tiểu trình chính phổ biến nhất hiện nay là gì?","options":{"A":"POSIX Pthreads, Windows threads, Java threads","B":"C++ threads, Python threads, Ruby threads","C":"Linux threads, Mac threads, Android threads","D":"UNIX API, Win32 API, OpenGL API"},"answer":"A"},{"id":"c4q12","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":12,"question":"Đặc điểm của mô hình Many-to-One là gì?","options":{"A":"Mỗi tiểu trình người dùng ánh xạ đến một tiểu trình mức nhân","B":"Nhiều tiểu trình ở mức người dùng được ánh xạ đến tiểu trình nhân duy nhất","C":"Cho phép hệ điều hành tự tạo lượng tiểu trình nhân theo ý muốn","D":"Tự động hỗ trợ chạy song song trên đa lõi"},"answer":"B"},{"id":"c4q13","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":13,"question":"Hạn chế lớn nhất của mô hình đa tiểu trình Many-to-One là gì?","options":{"A":"Mã nguồn quá phức tạp","B":"Không thể tạo quá 2 tiểu trình","C":"Một tiểu trình bị khóa thì tất cả các tiểu trình cũng bị khóa, và không chạy song song được trên hệ thống đa lõi","D":"Cần quá nhiều RAM"},"answer":"C"},{"id":"c4q14","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":14,"question":"Solaris Green Threads và GNU Portable Threads là ví dụ của mô hình nào?","options":{"A":"One-to-One","B":"Many-to-Many","C":"Mô hình 2 mức (Two-level)","D":"Many-to-One"},"answer":"D"},{"id":"c4q15","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":15,"question":"Đặc điểm của mô hình One-to-One là gì?","options":{"A":"Nhiều tiểu trình người dùng dùng chung 1 tiểu trình nhân","B":"Mỗi tiểu trình mức người dùng ánh xạ đến một tiểu trình mức nhân (việc tạo 1 tiểu trình người dùng sẽ tạo 1 tiểu trình nhân)","C":"Không cần tiểu trình nhân","D":"Hạn chế hoàn toàn khả năng chạy đồng thời"},"answer":"B"},{"id":"c4q16","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":16,"question":"Ưu điểm của mô hình One-to-One so với Many-to-One là gì?","options":{"A":"Thực thi đồng thời nhiều hơn","B":"Tiết kiệm bộ nhớ tuyệt đối","C":"Không bao giờ xảy ra lỗi","D":"Giảm số lượng nhân HĐH"},"answer":"A"},{"id":"c4q17","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":17,"question":"Tại sao mô hình One-to-One đôi khi bị hạn chế số lượng tiểu trình trên tiến trình?","options":{"A":"Vì HĐH không đủ mã định danh","B":"Vì chi phí tính toán (cost) khi phải tạo tiểu trình nhân tương ứng","C":"Vì lỗi bộ dịch mã","D":"Vì không hỗ trợ trên Windows"},"answer":"B"},{"id":"c4q18","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":18,"question":"Hệ điều hành Windows và Linux sử dụng mô hình đa tiểu trình nào?","options":{"A":"Many-to-One","B":"Many-to-Many","C":"One-to-One","D":"Mô hình 2 mức"},"answer":"C"},{"id":"c4q19","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":19,"question":"Mô hình Many-to-Many hoạt động theo nguyên tắc nào?","options":{"A":"Cho phép nhiều tiểu trình mức người dùng được ánh xạ đến nhiều tiểu trình mức nhân","B":"1 tiểu trình người dùng ánh xạ tới 1 tiểu trình nhân","C":"Chỉ có 1 tiểu trình nhân xử lý toàn bộ tiểu trình người dùng","D":"Hệ thống chỉ cho phép tạo đúng 2 tiểu trình"},"answer":"A"},{"id":"c4q20","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":20,"question":"Hệ thống Windows sử dụng gói ThreadFiber sẽ hỗ trợ mô hình đa tiểu trình nào?","options":{"A":"Many-to-One","B":"One-to-One","C":"Many-to-Many","D":"Two-level"},"answer":"C"},{"id":"c4q21","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":21,"question":"Mô hình 2 mức (Two-level model) là sự kết hợp của những gì?","options":{"A":"Giống mô hình many-to-many nhưng cũng cho phép 1 tiểu trình người dùng liên kết (bound) trực tiếp đến 1 tiểu trình nhân","B":"Mô hình Single-core và Multi-core","C":"Giữa User mode và Kernel mode","D":"Giữa RAM và Disk"},"answer":"A"},{"id":"c4q22","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":22,"question":"Thư viện Pthreads (POSIX threads) được định nghĩa như thế nào?","options":{"A":"Là một bản thực thi cụ thể bắt buộc trên mọi phần cứng","B":"Là một bản liệt kê (specification) các hoạt động của tiểu trình, không phải là sự thực thi","C":"Là ngôn ngữ lập trình độc lập","D":"Là phần mềm ứng dụng giao diện đồ họa"},"answer":"B"},{"id":"c4q23","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":23,"question":"Thư viện Pthreads rất phổ biến ở các hệ điều hành nào?","options":{"A":"MS-DOS và Windows 95","B":"Windows XP và Windows 7","C":"UNIX (Solaris, Linux, Mac OS X)","D":"Android và iOS thuần"},"answer":"C"},{"id":"c4q24","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":24,"question":"(Bài tập Code) Trong API Pthreads (C), hàm nào được sử dụng để tạo một tiểu trình mới?","options":{"A":"CreateThread()","B":"pthread_create()","C":"newThread()","D":"start_thread()"},"answer":"B"},{"id":"c4q25","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":25,"question":"(Bài tập Code) Trong API Pthreads (C), hàm nào được dùng để tiến trình cha \"chờ\" tiểu trình con kết thúc?","options":{"A":"pthread_wait()","B":"pthread_exit()","C":"pthread_join()","D":"WaitForSingleObject()"},"answer":"C"},{"id":"c4q26","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":26,"question":"(Bài tập Code) Khi tiểu trình con hoàn thành công việc của mình trong Pthreads, nó sử dụng lệnh nào để thoát?","options":{"A":"pthread_exit(0);","B":"exit();","C":"return null;","D":"CloseHandle();"},"answer":"A"},{"id":"c4q27","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":27,"question":"(Bài tập Code) API của hệ điều hành Windows sử dụng hàm nào để tạo một tiểu trình?","options":{"A":"pthread_create()","B":"CreateThread()","C":"WinThread()","D":"Fork()"},"answer":"B"},{"id":"c4q28","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":28,"question":"(Bài tập Code) Trong lập trình Windows Threads, hàm WaitForSingleObject() có chức năng gì?","options":{"A":"Tạo một đối tượng (object) mới","B":"Đợi một tiểu trình hoàn thành (finish)","C":"Khóa thiết bị ngoại vi","D":"Đóng một tiểu trình"},"answer":"B"},{"id":"c4q29","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":29,"question":"Thư viện tiểu trình Java (Java Threads) thường được thực thi (implement) dựa trên cơ sở nào?","options":{"A":"Viết hoàn toàn bằng mã Assembly","B":"Sử dụng mô hình tiểu trình được cung cấp bởi hệ điều hành gốc bên dưới","C":"Chạy trên một phần cứng chuyên dụng riêng","D":"Dựa trên giao thức TCP/IP"},"answer":"B"},{"id":"c4q30","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":30,"question":"(Bài tập Code) Lớp tiểu trình trong Java có thể được tạo bằng cách thực thi (implements) Interface nào sau đây?","options":{"A":"ThreadInterface","B":"Executable","C":"Runnable","D":"Callable"},"answer":"C"},{"id":"c4q31","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":31,"question":"(Bài tập Code) Trong Java, phương thức nào của đối tượng Thread được gọi để bắt đầu thực thi tiểu trình?","options":{"A":"run()","B":"start()","C":"init()","D":"execute()"},"answer":"B"},{"id":"c4q32","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":32,"question":"Khái niệm \"Tiểu trình ẩn\" (Implicit threading) nhằm giải quyết vấn đề gì?","options":{"A":"Chống virus lây nhiễm vào mã nguồn","B":"Vượt qua giới hạn bộ nhớ của CPU","C":"Giảm bớt khó khăn cho lập trình viên bằng cách chuyển việc tạo/quản lý tiểu trình cho trình biên dịch và thư viện run-time","D":"Ẩn thông tin cá nhân của người dùng"},"answer":"C"},{"id":"c4q33","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":33,"question":"Ba phương pháp thiết kế \"Tiểu trình ẩn\" chủ yếu được đề cập là gì?","options":{"A":"Pthreads, Win32, Java","B":"Thread Pools, OpenMP, Grand Central Dispatch (GCD)","C":"Fork, Exec, Join","D":"Serial, Concurrent, Parallel"},"answer":"B"},{"id":"c4q34","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":34,"question":"Thread Pool (Vùng lưu trữ tiểu trình) hoạt động theo cơ chế nào?","options":{"A":"Tự động tắt máy khi tạo quá nhiều tiến trình","B":"Xóa bỏ hoàn toàn khái niệm tiểu trình","C":"Tạo sẵn một số tiểu trình trong vùng lưu trữ, nơi các tiểu trình chờ đợi công việc","D":"Mã hóa tất cả các tiểu trình"},"answer":"C"},{"id":"c4q35","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":35,"question":"Đâu là ưu điểm của Thread Pool?","options":{"A":"Tốc độ tạo chậm hơn để đảm bảo an toàn","B":"Đáp ứng yêu cầu với tiểu trình có sẵn nhanh hơn là tạo mới, cho phép giới hạn số lượng tiểu trình","C":"Cho phép mỗi tiểu trình dùng không giới hạn RAM","D":"Yêu cầu lập trình viên can thiệp thủ công vào CPU"},"answer":"B"},{"id":"c4q36","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":36,"question":"OpenMP được định nghĩa là gì?","options":{"A":"Một hệ điều hành mạng","B":"Một tập các chỉ thị biên dịch (compiler directives) như một API cho C, C++, FORTRAN để hỗ trợ lập trình song song","C":"Ngôn ngữ lập trình mã nguồn mở","D":"Ứng dụng vẽ đồ họa song song"},"answer":"B"},{"id":"c4q37","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":37,"question":"(Bài tập Code) Cú pháp chỉ thị nào của OpenMP được dùng để xác định một \"vùng song song\" (parallel regions)?","options":{"A":"#include <omp.h>","B":"parallel_start()","C":"#pragma omp parallel","D":"#define OPENMP"},"answer":"C"},{"id":"c4q38","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":38,"question":"Khi áp dụng lệnh #pragma omp parallel for vào một vòng lặp for, OpenMP sẽ làm gì?","options":{"A":"Bỏ qua vòng lặp đó","B":"Chia vòng lặp và chạy song song trên nhiều tiểu trình/lõi","C":"Chạy vòng lặp vô tận","D":"Dừng toàn bộ chương trình"},"answer":"B"},{"id":"c4q39","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":39,"question":"Grand Central Dispatch (GCD) là công nghệ của hãng nào phát triển cho Mac OS X và iOS?","options":{"A":"Microsoft","B":"Google","C":"Sun Microsystems","D":"Apple"},"answer":"D"},{"id":"c4q40","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":40,"question":"(Bài tập Code) Trong GCD, khối lệnh (block) cần thực thi song song được đặt trong cú pháp nào?","options":{"A":"{ // code }","B":"^{ // code }","C":"[ // code ]","D":"< // code >"},"answer":"B"},{"id":"c4q41","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":41,"question":"Hai loại hàng đợi phân phối (dispatch queues) trong công nghệ GCD là gì?","options":{"A":"Stack và Heap","B":"PUSH và POP","C":"Serial (tuần tự) và Concurrent (đồng thời)","D":"User và Kernel"},"answer":"C"},{"id":"c4q42","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":42,"question":"Đặc điểm chung của cả hàng đợi Serial và Concurrent trong GCD là gì?","options":{"A":"Đều lấy các khối ra theo cơ chế LIFO","B":"Đều lấy các khối ra theo cơ chế FIFO (Vào trước ra trước)","C":"Chỉ chạy 1 khối tại 1 thời điểm","D":"Đều chặn hệ thống hoạt động"},"answer":"B"},{"id":"c4q43","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":43,"question":"API chính để thao tác với HĐH Windows (bao gồm tạo tiểu trình) được gọi là gì?","options":{"A":"Win64 API","B":"Windows API (Win32 API)","C":"POSIX","D":"Microsoft Foundation Classes (MFC)"},"answer":"B"},{"id":"c4q44","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":44,"question":"Việc quản lý tiểu trình trên hệ điều hành Windows được thiết kế theo mô hình nào?","options":{"A":"Many-to-Many","B":"Many-to-One","C":"One-to-One cấp độ nhân","D":"Mô hình 2 mức"},"answer":"C"},{"id":"c4q45","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":45,"question":"\"Ngữ cảnh của tiểu trình\" (Context of the thread) trong Windows bao gồm những gì?","options":{"A":"GUI và API","B":"Tập thanh ghi, Ngăn xếp (stack) và Vùng lưu trữ riêng (private storage area)","C":"Mã HTML và CSS","D":"Danh sách các tiến trình cha"},"answer":"B"},{"id":"c4q46","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":46,"question":"Trong HĐH Windows, ngăn xếp của tiểu trình được tách ra làm hai loại nào?","options":{"A":"Ngăn xếp cha và Ngăn xếp con","B":"Ngăn xếp Đọc và Ngăn xếp Ghi","C":"Ngăn xếp User (chế độ người dùng) và Ngăn xếp Kernel (chế độ hạt nhân)","D":"Ngăn xếp Tĩnh và Ngăn xếp Động"},"answer":"C"},{"id":"c4q47","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":47,"question":"Cấu trúc dữ liệu chính quản lý tiểu trình trên Windows bao gồm 3 khối (block) nào?","options":{"A":"PCB, TCB, MCB","B":"ETHREAD, KTHREAD, TEB","C":"EPROCESS, KPROCESS, PEB","D":"USER_THREAD, KERNEL_THREAD, SYS_THREAD"},"answer":"B"},{"id":"c4q48","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":48,"question":"Trong cấu trúc tiểu trình Windows, khối ETHREAD (executive thread block) chứa thông tin gì và tồn tại ở đâu?","options":{"A":"Chứa thông tin giao diện và ở vùng không gian user","B":"Chứa con trỏ trỏ tới tiến trình cha và con trỏ KTHREAD, tồn tại trong không gian nhân (Kernel space)","C":"Chứa mã định danh tiểu trình và ở vùng nhớ Cache","D":"Chứa bảng phân trang bộ nhớ"},"answer":"B"},{"id":"c4q49","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":49,"question":"Khối KTHREAD (kernel thread block) của Windows chứa những thông tin chủ yếu nào?","options":{"A":"Mã nguồn của chương trình người dùng","B":"Thông tin định thời, đồng bộ, một ngăn xếp chế độ nhân, và con trỏ trỏ tới TEB","C":"Địa chỉ IP của máy khách","D":"Mảng lưu trữ cục bộ cho biến toàn cục"},"answer":"B"},{"id":"c4q50","chapter":4,"chapterTitle":"TIỂU TRÌNH","number":50,"question":"Mảng lưu trữ cục bộ, ngăn xếp trong chế độ người dùng (User stack) và mã định danh tiểu trình được lưu tại khối nào trong cấu trúc Windows?","options":{"A":"KTHREAD","B":"ETHREAD","C":"TEB (thread environment block) nằm trong không gian người dùng","D":"PCB (Process Control Block)"},"answer":"C"},{"id":"c5q1","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":1,"question":"Việc các tiến trình truy cập đồng thời đến dữ liệu chia sẻ có thể dẫn đến hậu quả gì?","options":{"A":"Tiết kiệm tài nguyên bộ nhớ","B":"Dữ liệu không nhất quán (mâu thuẫn)","C":"Tăng tốc độ tính toán của CPU","D":"Hỗ trợ hệ thống chạy trên đa lõi"},"answer":"B"},{"id":"c5q2","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":2,"question":"Bài toán Producer-Consumer yêu cầu hai tiến trình thực hiện nhiệm vụ gì?","options":{"A":"Producer lấy thông tin, Consumer thêm thông tin","B":"Cả hai cùng lấy thông tin để xử lý","C":"Producer sản xuất (thêm) thông tin vào vùng đệm, Consumer tiêu thụ (lấy) thông tin từ vùng đệm","D":"Producer quản lý RAM, Consumer quản lý ổ cứng"},"answer":"C"},{"id":"c5q3","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":3,"question":"Trong bài toán Producer-Consumer giải quyết bằng vùng đệm vòng (bounded- buffer), con trỏ IN và OUT có vai trò gì?","options":{"A":"Con trỏ IN trỏ đến ô trống kế tiếp, con trỏ OUT trỏ đến ô đầy đầu tiên","B":"Con trỏ IN trỏ đến ô đầy đầu tiên, con trỏ OUT trỏ đến ô trống kế tiếp","C":"Cả hai đều trỏ vào phần tử cuối cùng","D":"Con trỏ IN trỏ vào ổ cứng, con trỏ OUT trỏ vào RAM"},"answer":"A"},{"id":"c5q4","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":4,"question":"Khi dùng biến counter để đếm số lượng ô đầy trong vùng đệm của bài toán Producer-Consumer, giá trị khởi tạo ban đầu của counter là bao nhiêu?","options":{"A":"BUFFER_SIZE","B":"1","C":"0","D":"-1"},"answer":"C"},{"id":"c5q5","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":5,"question":"Trong quá trình xử lý mã máy, thao tác counter++ của tiến trình Producer thực chất được thực hiện qua mấy câu lệnh mã máy (sử dụng thanh ghi)?","options":{"A":"1 lệnh duy nhất","B":"2 lệnh","C":"3 lệnh","D":"4 lệnh"},"answer":"C"},{"id":"c5q6","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":6,"question":"Tranh đoạt điều khiển (race condition) được định nghĩa là tình huống như thế nào?","options":{"A":"Nhiều tiến trình tranh giành băng thông mạng","B":"Nhiều tiến trình cùng thao tác trên dữ liệu chung và kết quả phụ thuộc vào thứ tự thực hiện","C":"CPU chia sẻ thời gian cho quá nhiều tiến trình","D":"Bộ nhớ bị cạn kiệt do tạo nhiều tiến trình"},"answer":"B"},{"id":"c5q7","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":7,"question":"Giải pháp bắt buộc để tránh tình trạng tranh đoạt điều khiển là gì?","options":{"A":"Nâng cấp phần cứng máy tính","B":"Tắt bớt các ứng dụng đang chạy","C":"Đồng bộ hóa các tiến trình theo một phương thức nào đó","D":"Cấp phát thêm vùng đệm"},"answer":"B"},{"id":"c5q8","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":8,"question":"Trong cấu trúc của một tiến trình, đoạn mã mà tiến trình có thể thay đổi các biến chung, cập nhật bảng, ghi tập tin được gọi là gì?","options":{"A":"Remainder section (Phần còn lại)","B":"Entry section (Phần vào)","C":"Exit section (Phần ra)","D":"Critical section (Miền găng)"},"answer":"D"},{"id":"c5q9","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":9,"question":"Cấu trúc tổng quát của tiến trình Pi trong bài toán miền găng lần lượt bao gồm các phần nào?","options":{"A":"Entry section -> Critical section -> Exit section -> Remainder section","B":"Critical section -> Entry section -> Remainder section -> Exit section","C":"Entry section -> Remainder section -> Critical section -> Exit section","D":"Exit section -> Critical section -> Entry section -> Remainder section"},"answer":"A"},{"id":"c5q10","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":10,"question":"Yêu cầu \"Độc quyền truy xuất\" (Mutual Exclusion) trong bài toán miền găng có ý nghĩa gì?","options":{"A":"Tất cả các tiến trình phải cùng vào miền găng một lúc","B":"Tiến trình bị treo vô thời hạn khi vào miền găng","C":"Nếu tiến trình Pi đang thực thi trong miền găng, không tiến trình nào khác được thực thi trong miền găng của chúng","D":"Hạn chế số lần gọi hệ thống"},"answer":"C"},{"id":"c5q11","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":11,"question":"Yêu cầu \"Tiến độ\" (Progress) trong giải pháp cho miền găng đảm bảo điều gì?","options":{"A":"Nếu không có tiến trình nào trong miền găng và có tiến trình muốn vào, việc lựa chọn tiến trình tiếp theo không bị trì hoãn vô hạn","B":"Tiến trình đang chạy có thể độc quyền CPU mãi mãi","C":"Tiến trình phải hoàn thành trong 1 mili-giây","D":"Việc lựa chọn tiến trình được thực hiện ngẫu nhiên"},"answer":"A"},{"id":"c5q12","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":12,"question":"Giới hạn chờ (Bounded waiting) có nghĩa là gì?","options":{"A":"Thời gian CPU chờ sự kiện I/O là có giới hạn","B":"Tồn tại một giới hạn số lần vào miền găng của các tiến trình khác sau khi một tiến trình yêu cầu vào miền găng mà chưa được chấp nhận","C":"Bộ nhớ RAM bị giới hạn dung lượng","D":"CPU chỉ chờ ngắt phần cứng"},"answer":"B"},{"id":"c5q13","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":13,"question":"Khi quản lý miền găng trong HĐH, cách tiếp cận \"Độc quyền\" (nonpreemptive) có đặc điểm nào sau đây?","options":{"A":"Cho phép tiến trình chạy trong chế độ nhân được ưu tiên","B":"Không cho phép một tiến trình đang chạy trong chế độ nhân được ưu tiên, do đó không có tranh đoạt điều khiển","C":"Buộc tất cả tiến trình phải vào hàng đợi","D":"Tự động xóa tiến trình khi xảy ra lỗi"},"answer":"B"},{"id":"c5q14","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":14,"question":"Giải pháp Peterson (bằng phần mềm) được thiết kế tối ưu để áp dụng cho bao nhiêu tiến trình?","options":{"A":"1 tiến trình","B":"2 tiến trình",
