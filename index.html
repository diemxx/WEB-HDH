"C":"3 tiến trình","D":"N tiến trình"},"answer":"B"},{"id":"c5q15","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":15,"question":"Trong giải pháp Peterson, 2 tiến trình chia sẻ 2 biến số nào?","options":{"A":"int turn và Boolean flag","B":"int count và Boolean lock","C":"int flag và Boolean turn","D":"Semaphore mutex và int turn"},"answer":"A"},{"id":"c5q16","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":16,"question":"Biến flag[i] = true trong giải pháp Peterson mang ý nghĩa gì?","options":{"A":"Tiến trình Pi đã hoàn thành công việc","B":"Tiến trình Pi sẵn sàng vào miền găng (Critical Section)","C":"Tiến trình Pi nhường quyền cho tiến trình Pj","D":"Lỗi phần cứng đã xảy ra"},"answer":"B"},{"id":"c5q17","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":17,"question":"Trong mã nguồn của giải pháp Peterson, điều kiện vòng lặp while để tiến trình Pi phải chờ (đứng ngoài miền găng) là gì?","options":{"A":"while (flag[i] == false);","B":"while (turn == i);","C":"while (flag[j] && turn == j);","D":"while (true);"},"answer":"C"},{"id":"c5q18","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":18,"question":"Công cụ đơn giản nhất do các nhà thiết kế HĐH xây dựng để bảo vệ miền găng là gì?","options":{"A":"Khóa loại trừ (Mutex locks)","B":"Bảng phân trang","C":"Cây nhị phân","D":"Thuật toán nhà băng"},"answer":"A"},{"id":"c5q19","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":19,"question":"Hai hàm cơ bản được sử dụng trong Khóa loại trừ (Mutex locks) để bảo vệ miền găng là gì?","options":{"A":"wait() và signal()","B":"acquire() và release()","C":"open() và close()","D":"lock() và unlock()"},"answer":"B"},{"id":"c5q20","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":20,"question":"Hạn chế lớn nhất của giải pháp Khóa loại trừ (Mutex locks) cơ bản là gì?","options":{"A":"Tốn nhiều dung lượng ổ cứng","B":"Yêu cầu cơ chế bận thì đợi (busy waiting), gây lãng phí CPU","C":"Không thể sử dụng cho 2 tiến trình","D":"Chỉ chạy trên Linux"},"answer":"B"},{"id":"c5q21","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":21,"question":"Loại khóa sử dụng cơ chế bận thì đợi (busy waiting) thường được gọi là gì?","options":{"A":"Deadlock","B":"Mutex","C":"Spinlock","D":"Semaphore"},"answer":"C"},{"id":"c5q22","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":22,"question":"Ai là người phát minh ra khái niệm Semaphore vào năm 1965?","options":{"A":"Alan Turing","B":"Bill Gates","C":"Edsger Wybe Dijkstra","D":"Linus Torvalds"},"answer":"C"},{"id":"c5q23","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":23,"question":"Semaphore S bản chất là một kiểu dữ liệu gì?","options":{"A":"Số thực","B":"Mảng ký tự","C":"Con trỏ","D":"Biến nguyên (số nguyên)"},"answer":"D"},{"id":"c5q24","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":24,"question":"Semaphore chỉ có thể được truy cập thông qua 2 toán tử nguyên tố (hàm) nào?","options":{"A":"wait() (hoặc P()) và signal() (hoặc V())","B":"acquire() và release()","C":"start() và stop()","D":"push() và pop()"},"answer":"A"},{"id":"c5q25","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":25,"question":"Trong định nghĩa cơ bản (có busy waiting), thao tác signal(S) thực hiện công việc gì đối với biến S?","options":{"A":"Gán S = 0","B":"Giảm S đi 1 (S--)","C":"Tăng S lên 1 (S++)","D":"Khóa S lại"},"answer":"C"},{"id":"c5q26","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":26,"question":"Khái niệm \"Semaphore nhị phân\" (Binary semaphore) có nghĩa là gì?","options":{"A":"Giá trị nguyên không bị giới hạn","B":"Giá trị nguyên chỉ là 0 hoặc 1","C":"Cấu tạo từ các bit 0 và 1 trên đĩa cứng","D":"Chỉ cho phép 2 tiến trình chia sẻ"},"answer":"B"},{"id":"c5q27","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":27,"question":"(Bài tập Logic) Tiến trình P1 có lệnh S1, tiến trình P2 có lệnh S2. Để S2 luôn thực thi SAU S1, ta khởi tạo semaphore synch = 0. Tiến trình P1 thực thi S1; signal(synch);. Tiến trình P2 cần thực thi chuỗi lệnh nào?","options":{"A":"wait(synch); S2;","B":"signal(synch); S2;","C":"S2; wait(synch);","D":"S2; signal(synch);"},"answer":"A"},{"id":"c5q28","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":28,"question":"Để loại bỏ cơ chế \"bận thì đợi\" (busy waiting) trong Semaphore, HĐH bổ sung hai thao tác nào để quản lý hàng đợi tiến trình?","options":{"A":"Read và Write","B":"Block (đưa tiến trình vào hàng đợi) và Wakeup (chuyển tiến trình sang Ready)","C":"Start và Kill","D":"Push và Pop"},"answer":"B"},{"id":"c5q29","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":29,"question":"Trong cấu trúc dữ liệu của Semaphore không có busy waiting, mỗi phần tử trong hàng đợi (waiting queue) chứa 2 thành phần nào?","options":{"A":"Giá trị (số nguyên) và con trỏ tới bản ghi kế tiếp trong danh sách","B":"Biến boolean và lệnh thực thi","C":"Thanh ghi CPU và bộ đếm chương trình","D":"Biến turn và mảng flag"},"answer":"A"},{"id":"c5q30","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":30,"question":"Hiện tượng hai hoặc nhiều tiến trình đang chờ đợi vô hạn cho một sự kiện chỉ có thể được sinh ra bởi một trong các tiến trình đang chờ đó, được gọi là gì?","options":{"A":"Tắc nghẽn (Deadlock)","B":"Đảo độ ưu tiên (Priority Inversion)","C":"Đói CPU (Starvation)","D":"Tranh đoạt điều khiển (Race condition)"},"answer":"A"},{"id":"c5q31","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":31,"question":"Tình trạng \"Đói CPU\" (Starvation) trong đồng bộ hóa tiến trình được hiểu là gì?","options":{"A":"Tiến trình bị xóa khỏi RAM do thiếu bộ nhớ","B":"Tiến trình không bao giờ được rời khỏi hàng đợi semaphore nơi nó bị tạm dừng","C":"Các tiến trình tranh nhau CPU dẫn đến màn hình xanh","D":"CPU bị quá nhiệt do làm việc liên tục"},"answer":"B"},{"id":"c5q32","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":32,"question":"Đảo độ ưu tiên (Priority Inversion) xảy ra trong trường hợp nào?","options":{"A":"Tiến trình ưu tiên cao phải chờ tiến trình ưu tiên thấp do ưu tiên thấp đang giữ khóa mà ưu tiên cao cần","B":"HĐH tự động thay đổi độ ưu tiên của tiến trình ngẫu nhiên","C":"Người dùng hạ thấp độ ưu tiên của hệ thống","D":"Tiến trình con thay thế tiến trình cha"},"answer":"A"},{"id":"c5q33","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":33,"question":"Trong bài toán \"Vùng đệm có giới hạn\" (Bounded-buffer) với N ô nhớ, Semaphore empty và Semaphore full được khởi tạo giá trị lần lượt là bao nhiêu?","options":{"A":"empty = 0, full = N","B":"empty = 1, full = 0","C":"empty = N, full = 0","D":"empty = 0, full = 0"},"answer":"C"},{"id":"c5q34","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":34,"question":"(Bài tập Code) Trong cấu trúc tiến trình Consumer của bài toán vùng đệm, để lấy một phần tử ra, Consumer phải gọi chuỗi hàm nào đầu tiên?","options":{"A":"wait(full); wait(mutex);","B":"wait(empty); wait(mutex);","C":"signal(full); signal(mutex);","D":"wait(mutex); wait(empty);"},"answer":"A"},{"id":"c5q35","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":35,"question":"Trong bài toán \"Tiến trình Đọc - Ghi\" (Readers - Writers), các tiến trình Reader có tính chất gì?","options":{"A":"Có thể đọc và thay đổi dữ liệu","B":"Chỉ đọc dữ liệu, không thực hiện bất kỳ thay đổi nào","C":"Có quyền xóa dữ liệu","D":"Có quyền cấp phát bộ nhớ"},"answer":"B"},{"id":"c5q36","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":36,"question":"Tính đồng bộ yêu cầu đối với tiến trình Writer trong bài toán Đọc - Ghi là gì?","options":{"A":"Nhiều tiến trình Writer có thể ghi cùng lúc","B":"Chỉ duy nhất một tiến trình Writer được truy cập dữ liệu chia sẻ tại cùng thời điểm","C":"Writer phải luôn chờ Reader đọc xong toàn bộ hệ thống vĩnh viễn","D":"Writer phải ghi vào tệp nhật ký (log) ngoài RAM"},"answer":"B"},{"id":"c5q37","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":37,"question":"Trong bài toán Đọc - Ghi, biến số nguyên Read_count dùng để làm gì và được khởi tạo là bao nhiêu?","options":{"A":"Đếm số lần CPU ngắt, khởi tạo = 1","B":"Theo dõi số lượng các tiến trình Reader đang đọc dữ liệu, khởi tạo = 0","C":"Đếm số lượng Writer, khởi tạo = 1","D":"Đếm dung lượng tệp tin, khởi tạo = 0"},"answer":"B"},{"id":"c5q38","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":38,"question":"Biến thể \"Dạng 1\" của bài toán Đọc - Ghi ưu tiên đối tượng nào?","options":{"A":"Ưu tiên Writer, Writer ghi càng sớm càng tốt","B":"Không có Reader nào phải chờ trừ khi Writer có quyền sử dụng dữ liệu (Ưu tiên Reader)","C":"Ưu tiên theo độ lớn tiến trình","D":"Ngẫu nhiên theo thời gian thực"},"answer":"B"},{"id":"c5q39","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":39,"question":"Trong bài toán \"Bữa ăn tối của các triết gia\" (Dining Philosophers), có bao nhiêu triết gia và bao nhiêu chiếc đũa?","options":{"A":"4 triết gia, 5 đũa","B":"5 triết gia, 5 đũa","C":"5 triết gia, 10 đũa","D":"3 triết gia, 3 đũa"},"answer":"B"},{"id":"c5q40","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":40,"question":"Điều kiện để một triết gia có thể ăn là gì?","options":{"A":"Phải suy nghĩ xong 1 tiếng","B":"Phải có 1 chiếc đũa bên phải","C":"Phải có đủ 2 chiếc đũa gần nhất ở bên phải và bên trái mình, và chỉ được lấy 1 chiếc 1 lần","D":"Phải chờ người bên cạnh đút cho"},"answer":"C"},{"id":"c5q41","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":41,"question":"Để giải quyết bài toán các triết gia, mảng Semaphore chopstick được khởi tạo với giá trị bằng bao nhiêu cho mỗi phần tử?","options":{"A":"0","B":"1","C":"5","D":"-1"},"answer":"B"},{"id":"c5q42","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":42,"question":"(Bài tập Code) Để lấy chiếc đũa bên tay phải, triết gia thứ i (từ 0 đến 4) sẽ thực hiện hàm nào? (Giả sử chiếc đũa trái là i)","options":{"A":"wait(chopstick[i+1]);","B":"wait(chopstick[(i + 1) % 5]);","C":"signal(chopstick[i]);","D":"wait(chopstick[(i + 4) % 5]);"},"answer":"B"},{"id":"c5q43","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":43,"question":"Để xử lý hiện tượng Tắc nghẽn (Deadlock) trong bài toán triết gia, phương pháp \"Bất đối xứng\" hoạt động như thế nào?","options":{"A":"Cho 4 người ngồi vào bàn cùng lúc","B":"Triết gia lẻ lấy đũa trái trước rồi phải sau; Triết gia chẵn lấy đũa phải trước rồi trái sau","C":"Cho phép lấy đũa của người đối diện","D":"Phát thêm 5 chiếc dĩa"},"answer":"B"},{"id":"c5q44","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":44,"question":"Một vấn đề nghiêm trọng có thể xảy ra nếu lập trình viên gọi sai thứ tự wait(mutex) và signal(mutex) là gì?","options":{"A":"Máy tính sẽ tự động khởi động lại","B":"Trình biên dịch sẽ báo lỗi cú pháp","C":"Có thể xảy ra Tắc nghẽn (Deadlock) và Đói CPU (Starvation)","D":"Dung lượng RAM sẽ tăng lên"},"answer":"C"},{"id":"c5q45","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":45,"question":"\"Monitor\" trong hệ điều hành được định nghĩa là gì?","options":{"A":"Một màn hình hiển thị kết quả","B":"Giải pháp trừu tượng hóa mức cao (Kiểu dữ liệu trừu tượng - ADT) cung cấp cơ chế tiện lợi để đồng bộ hóa","C":"Khóa phần cứng chuyên dụng","D":"Thuật toán phân trang bộ nhớ"},"answer":"B"},{"id":"c5q46","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":46,"question":"Đặc điểm cốt lõi của tiến trình bên trong Monitor là gì?","options":{"A":"Có thể chạy vô số tiến trình song song bên trong","B":"Chỉ có một tiến trình duy nhất có thể hoạt động bên trong monitor tại một thời điểm","C":"Tiến trình trong monitor không bao giờ kết thúc","D":"Các biến nội bộ có thể được truy cập tự do từ bên ngoài"},"answer":"B"},{"id":"c5q47","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":47,"question":"Trong một monitor, biến điều kiện (Condition variables) hỗ trợ 2 thao tác nào?","options":{"A":"wait() và signal()","B":"acquire() và release()","C":"block() và wakeup()","D":"P() và V()"},"answer":"A"},{"id":"c5q48","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":48,"question":"Nếu tiến trình Q đang tạm ngưng tại lệnh x.wait(), và tiến trình P gọi x.signal(). Theo sự thỏa hiệp của ngôn ngữ Concurrent Pascal (Lựa chọn biến điều kiện), điều kiện gì sẽ xảy ra?","options":{"A":"P tiếp tục chạy, Q bị hủy bỏ","B":"P đang thực thi signal sẽ rời Monitor thì Q được khôi phục","C":"Cả 2 cùng thực thi song song","D":"HĐH bị tắc nghẽn"},"answer":"B"},{"id":"c5q49","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":49,"question":"Trong giải pháp Monitor cho bài toán Cấp phát tài nguyên duy nhất (Resource Allocator), lệnh R.acquire(t) dùng biến t (thời gian) để làm gì?","options":{"A":"Đặt mật khẩu truy cập","B":"Phân mảnh bộ nhớ","C":"Làm số ưu tiên để quy định thời gian tối đa cho việc sử dụng tài nguyên của tiến trình","D":"Tính tổng số tiến trình"},"answer":"C"},{"id":"c5q50","chapter":5,"chapterTitle":"ĐỒNG BỘ HÓA TIẾN TRÌNH","number":50,"question":"Khi thực thi Monitor sử dụng cấu trúc Semaphore, để đảm bảo độc quyền truy xuất cho các thủ tục, mỗi thủ tục F trong Monitor phải bắt đầu bằng hàm gì?","options":{"A":"signal(next);","B":"wait(mutex);","C":"signal(mutex);","D":"wait(x_sem);"},"answer":"B"},{"id":"c6q1","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":1,"question":"Mục tiêu đạt tới của hệ thống đa chương (multiprogramming) là gì?","options":{"A":"Tối đa việc sử dụng CPU","B":"Tối đa hóa thời gian chờ","C":"Tối giản bộ nhớ RAM","D":"Tăng thời gian chuyển ngữ cảnh"},"answer":"A"},{"id":"c6q2","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":2,"question":"Việc thực thi của một tiến trình bao gồm luân phiên giữa hai chu kỳ nào?","options":{"A":"RAM burst và Disk burst","B":"CPU burst và I/O burst","C":"Network burst và CPU burst","D":"Ready burst và Wait burst"},"answer":"B"},{"id":"c6q3","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":3,"question":"Một chu kỳ thực thi của tiến trình thường bắt đầu bằng hoạt động nào?","options":{"A":"I/O burst","B":"Chuyển ngữ cảnh","C":"CPU burst","D":"Sinh ra tiến trình con"},"answer":"C"},{"id":"c6q4","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":4,"question":"Tâm điểm của việc thiết kế Hệ điều hành trong định thời là phân phối hoạt động nào?","options":{"A":"RAM burst","B":"CPU burst","C":"I/O burst","D":"Network burst"},"answer":"B"},{"id":"c6q5","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":5,"question":"Thành phần nào chịu trách nhiệm lựa chọn 1 trong các tiến trình nằm sẵn trong hàng đợi Ready để cấp phát CPU?","options":{"A":"Bộ phân phối (Dispatcher)","B":"Bộ định thời trung hạn","C":"Bộ định thời ngắn hạn (Short-term scheduler)","D":"Khối điều khiển tiến trình (PCB)"},"answer":"C"},{"id":"c6q6","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":6,"question":"Việc định thời CPU xảy ra khi tiến trình chuyển từ trạng thái Running sang Waiting thuộc cơ chế nào?","options":{"A":"Không độc quyền (Preemptive)","B":"Độc quyền (Nonpreemptive)","C":"Chia sẻ thời gian (Time-sharing)","D":"Phân tán"},"answer":"B"},{"id":"c6q7","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":7,"question":"Việc định thời theo cơ chế KHÔNG độc quyền (preemptive) diễn ra trong trường hợp nào dưới đây?","options":{"A":"Tiến trình chuyển từ Running sang Waiting","B":"Tiến trình chuyển từ Running sang Ready","C":"Tiến trình kết thúc việc thực thi","D":"Tiến trình yêu cầu truy xuất I/O"},"answer":"B"},{"id":"c6q8","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":8,"question":"Khi hệ điều hành áp dụng định thời cơ chế không độc quyền (preemptive), vấn đề nào KHÔNG cần phải xem xét?","options":{"A":"Việc truy xuất đến dữ liệu chia sẻ","B":"Tính ưu tiên khi ở chế độ nhân (kernel mode)","C":"Các ngắt xảy ra trong các hoạt động quyết định của HĐH","D":"Việc khởi động lại máy tính người dùng"},"answer":"D"},{"id":"c6q9","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":9,"question":"Thành phần nào thực hiện việc \"Chuyển điều khiển của CPU cho tiến trình được chọn bởi bộ định thời ngắn hạn\"?","options":{"A":"Bộ phân phối (Dispatcher)","B":"Bộ đếm chương trình (PC)","C":"Bộ nhớ đệm (Cache)","D":"Hàng đợi sẵn sàng (Ready queue)"},"answer":"A"},{"id":"c6q10","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":10,"question":"Chức năng của Bộ phân phối (Dispatcher) bao gồm những gì?","options":{"A":"Chuyển ngữ cảnh, chuyển sang chế độ người dùng, nhảy tới vị trí thích hợp để khởi động chương trình","B":"Tính toán độ ưu tiên, cập nhật thời gian chờ","C":"Giải phóng bộ nhớ RAM khi tiến trình kết thúc","D":"Tạm ngưng và hoán đổi tiến trình ra đĩa cứng"},"answer":"A"},{"id":"c6q11","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":11,"question":"\"Dispatch latency\" (Thời gian trễ phân phối) được định nghĩa là gì?","options":{"A":"Thời gian CPU thực thi một câu lệnh","B":"Thời gian cần cho bộ phân phối dừng một tiến trình và bắt đầu chạy một tiến trình khác","C":"Thời gian tiến trình chờ thiết bị ngoại vi","D":"Thời gian lưu trữ dữ liệu vào ổ cứng"},"answer":"B"},{"id":"c6q12","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":12,"question":"Tiêu chuẩn định thời \"Thông lượng\" (Throughput) dùng để chỉ điều gì?","options":{"A":"Số lượng người dùng truy cập cùng lúc","B":"Thời gian tiến trình chờ trong hàng đợi","C":"Số tiến trình hoàn thành việc thực thi trên mỗi đơn vị thời gian","D":"Lượng dữ liệu mạng truyền qua trong 1 giây"},"answer":"C"},{"id":"c6q13","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":13,"question":"\"Turnaround time\" (Thời gian hoàn tất) có nghĩa là gì?","options":{"A":"Lượng thời gian tiến trình chờ ở trạng thái Ready","B":"Lượng thời gian để thực hiện một tiến trình cụ thể (từ lúc vào đến lúc xong)","C":"Lượng thời gian giữ cho CPU bận","D":"Thời gian hệ điều hành khởi động"},"answer":"B"},{"id":"c6q14","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":14,"question":"Lượng thời gian phải mất từ khi một yêu cầu được gửi cho đến khi đáp ứng đầu tiên được trả lời gọi là gì?","options":{"A":"Waiting time","B":"Turnaround time","C":"Dispatch latency","D":"Response time"},"answer":"D"},{"id":"c6q15","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":15,"question":"Để tối ưu hóa hệ thống, người thiết kế HĐH cần làm gì với các tiêu chuẩn định thời?","options":{"A":"Cực tiểu việc sử dụng CPU, Cực đại thời gian hoàn tất","B":"Cực đại CPU utilization và Thông lượng; Cực tiểu thời gian hoàn tất, chờ và đáp ứng","C":"Cực đại tất cả các tiêu chuẩn","D":"Cực tiểu tất cả các tiêu chuẩn"},"answer":"B"},{"id":"c6q16","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":16,"question":"Giải thuật FCFS là viết tắt của thuật ngữ nào?","options":{"A":"First-Come, First-Served","B":"Fast-CPU, Fast-Served","C":"First-Core, First-Scheduled","D":"Free-CPU, Free-Space"},"answer":"A"},{"id":"c6q17","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":17,"question":"Giải thuật SJF là viết tắt của thuật ngữ nào?","options":{"A":"Shortest-Job-First","B":"Standard-Job-First","C":"System-Job-First","D":"Synchronized-Job-First"},"answer":"A"},{"id":"c6q18","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":18,"question":"(Bài tập FCFS) Giả sử có 3 tiến trình đến theo thứ tự P1, P2, P3. Thời gian xử lý của P1 = 24, P2 = 3, P3 = 3. Thời gian chờ của tiến trình P2 là bao nhiêu?","options":{"A":"0","B":"3","C":"24","D":"27"},"answer":"C"},{"id":"c6q19","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":19,"question":"(Bài tập FCFS) Cùng với ví dụ trên (P1=24, P2=3, P3=3; thứ tự P1, P2, P3), thời gian chờ trung bình là bao nhiêu?","options":{"A":"10","B":"17","C":"27","D":"30"},"answer":"B"},{"id":"c6q20","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":20,"question":"(Bài tập FCFS) Nếu 3 tiến trình trên (P1=24, P2=3, P3=3) đến theo thứ tự P2, P3, P1 thì thời gian chờ của P1 là bao nhiêu?","options":{"A":"0","B":"3","C":"6","D":"24"},"answer":"C"},{"id":"c6q21","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":21,"question":"(Bài tập FCFS) Với thứ tự P2, P3, P1 như trên, thời gian chờ trung bình lúc này sẽ là bao nhiêu?","options":{"A":"3","B":"6","C":"17","D":"10"},"answer":"A"},{"id":"c6q22","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":22,"question":"(Bài tập FCFS) Cho bảng tiến trình: P1(Vào lúc 0, xử lý 10), P2(Vào lúc 1, xử lý 1), P3(Vào lúc 2.5, xử lý 2), P4(Vào lúc 3, xử lý 1), P5(Vào lúc 4.5, xử lý 5). Thời gian chờ trung bình theo FCFS là bao nhiêu?","options":{"A":"5.5","B":"6.2","C":"7.4","D":"8.5"},"answer":"C"},{"id":"c6q23","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":23,"question":"Nguyên tắc hoạt động của giải thuật Shortest-Job-First (SJF) là gì?","options":{"A":"Cấp phát CPU cho tiến trình đến sớm nhất","B":"Gắn mỗi tiến trình với độ dài CPU burst tiếp theo của nó, định thời tiến trình có thời gian ngắn nhất","C":"Cấp CPU cho tiến trình có mức độ quan trọng do người dùng chọn","D":"Luân phiên chia thời gian cho các tiến trình"},"answer":"B"},{"id":"c6q24","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":24,"question":"Tính chất quan trọng nhất của giải thuật SJF là gì?","options":{"A":"Dễ lập trình nhất","B":"Đảm bảo 100% không bị đói CPU","C":"Là giải thuật tối ưu - cung cấp thời gian chờ trung bình nhỏ nhất cho một tập tiến trình","D":"Chỉ chạy được trên chế độ ưu tiên"},"answer":"C"},{"id":"c6q25","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":25,"question":"(Bài tập SJF Độc quyền) Cho 4 tiến trình đến cùng lúc: P1(6), P2(8), P3(7), P4(3). Thứ tự thực hiện trên biểu đồ Gantt sẽ là gì?","options":{"A":"P1 -> P2 -> P3 -> P4","B":"P4 -> P1 -> P3 -> P2","C":"P4 -> P3 -> P1 -> P2","D":"P2 -> P3 -> P1 -> P4"},"answer":"B"},{"id":"c6q26","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":26,"question":"(Bài tập SJF Độc quyền) Ở ví dụ trên, thời gian chờ của P3 là bao nhiêu?","options":{"A":"0","B":"3","C":"9","D":"16"},"answer":"C"},{"id":"c6q27","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":27,"question":"(Bài tập SJF Độc quyền) Với ví dụ trên, thời gian chờ trung bình của 4 tiến trình là bao nhiêu?","options":{"A":"7","B":"9","C":"16","D":"24"},"answer":"A"},{"id":"c6q28","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":28,"question":"Giải thuật \"Shortest-remaining-time-first\" (SRTF) chính là giải thuật SJF kết hợp với cơ chế nào?","options":{"A":"Cơ chế độc quyền (Nonpreemptive)","B":"Cơ chế phân mảnh","C":"Cơ chế không độc quyền (Preemptive)","D":"Cơ chế xoay vòng (Round Robin)"},"answer":"C"},{"id":"c6q29","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":29,"question":"(Bài tập SRTF) Có các tiến trình sau: P1(Đến 0, xử lý 8); P2(Đến 1, xử lý 4); P3(Đến 2, xử lý 9); P4(Đến 3, xử lý 5). Tại thời điểm t=1 khi P2 đến, CPU sẽ xử lý như thế nào?","options":{"A":"P1 tiếp tục chạy vì đã được cấp quyền trước","B":"HĐH ngắt P1, chuyển CPU cho P2 vì phần thời gian còn lại của P1 (7) lớn hơn thời gian của P2 (4)","C":"CPU chia đôi thời gian cho P1 và P2","D":"Đưa P2 vào hàng chờ vô hạn"},"answer":"B"},{"id":"c6q30","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":30,"question":"(Bài tập SRTF) Tiếp ví dụ trên, sau khi ngắt P1 ở thời điểm t=1, tiến trình P2 sẽ thực hiện và kết thúc tại thời điểm t bằng mấy?","options":{"A":"t = 4","B":"t = 5","C":"t = 9","D":"t = 10"},"answer":"B"},{"id":"c6q31","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":31,"question":"(Bài tập SRTF) Tại thời điểm t=5 (P2 vừa xong), các tiến trình còn lại là P1(còn 7), P3(còn 9), P4(còn 5). Tiến trình nào sẽ được chạy tiếp theo?","options":{"A":"P1","B":"P3","C":"P4","D":"Tùy ý"},"answer":"C"},{"id":"c6q32","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":32,"question":"(Bài tập SRTF) Thời gian chờ của tiến trình P4 (Đến lúc 3, bắt đầu chạy lúc 5) trong ví dụ này là bao nhiêu?","options":{"A":"0","B":"2","C":"5","D":"8"},"answer":"B"},{"id":"c6q33","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":33,"question":"(Bài tập SRTF) Với 4 tiến trình P1, P2, P3, P4 trong ví dụ trên, thời gian chờ trung bình của hệ thống là bao nhiêu?","options":{"A":"5.5 msec","B":"6.5 msec","C":"7.5 msec","D":"8.0 msec"},"answer":"B"},{"id":"c6q34","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":34,"question":"Nguyên tắc của giải thuật Định thời ưu tiên (Priority) là gì?","options":{"A":"CPU được cấp cho tiến trình đến sớm nhất","B":"Mỗi tiến trình được gán một số ưu tiên, CPU cấp phát cho tiến trình có độ ưu tiên cao nhất","C":"Cấp phát CPU ngẫu nhiên","D":"Phân bổ đều thời gian bằng quantum"},"answer":"B"},{"id":"c6q35","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":35,"question":"Trong định thời Priority, hệ thống quy định độ lớn của mức ưu tiên như thế nào?","options":{"A":"Số nguyên nhỏ nhất tương ứng với độ ưu tiên cao nhất","B":"Số nguyên lớn nhất tương ứng với độ ưu tiên cao nhất","C":"Các số chẵn có ưu tiên cao hơn","D":"Số âm không được dùng"},"answer":"A"},{"id":"c6q36","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":36,"question":"Có thể coi giải thuật SJF là một trường hợp đặc biệt của định thời Ưu tiên (Priority), trong đó độ ưu tiên là gì?","options":{"A":"Kích thước bộ nhớ RAM của tiến trình","B":"Độ dài hàng đợi chờ","C":"Nghịch đảo của thời gian CPU burst (thời gian burst càng lớn thì độ ưu tiên càng thấp)","D":"Thời gian tiến trình đã chờ trong hệ thống"},"answer":"C"},{"id":"c6q37","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":37,"question":"Vấn đề \"Đói CPU\" (Starvation) trong giải thuật Priority là hiện tượng gì?","options":{"A":"CPU bị cạn kiệt tài nguyên","B":"Tiến trình có độ ưu tiên cao chiếm dụng toàn bộ bộ nhớ","C":"Bộ nhớ Cache bị lỗi","D":"Tiến trình có độ ưu tiên thấp có thể không bao giờ được thực thi vì luôn có tiến trình ưu tiên cao hơn chen ngang"},"answer":"D"},{"id":"c6q38","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":38,"question":"Giải pháp được hệ điều hành sử dụng để khắc phục tình trạng \"Đói CPU\" là gì?","options":{"A":"Restart tiến trình","B":"Hạn chế mức độ đa chương","C":"Tăng độ ưu tiên (Aging) - tăng dần độ ưu tiên của tiến trình theo thời gian chờ","D":"Chạy lại tiến trình ở chế độ nhân"},"answer":"C"},{"id":"c6q39","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":39,"question":"(Bài tập Priority) Có 5 tiến trình (vào cùng lúc 0) với Thời gian xử lý và Độ ưu tiên (số nhỏ = ưu tiên cao) như sau: P1(10, pri:3); P2(1, pri:1); P3(2, pri:4); P4(1, pri:5); P5(5, pri:2). Tiến trình nào sẽ được chạy đầu tiên?","options":{"A":"P1","B":"P2","C":"P4","D":"P5"},"answer":"B"},{"id":"c6q40","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":40,"question":"(Bài tập Priority) Tiếp ví dụ trên, thứ tự thực hiện trên biểu đồ Gantt sẽ là gì?","options":{"A":"P1 -> P2 -> P3 -> P4 -> P5","B":"P2 -> P5 -> P1 -> P3 -> P4","C":"P4 -> P3 -> P1 -> P5 -> P2","D":"P2 -> P1 -> P5 -> P3 -> P4"},"answer":"B"},{"id":"c6q41","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":41,"question":"(Bài tập Priority) Tiếp ví dụ trên, thời gian chờ của tiến trình P1 là bao nhiêu?","options":{"A":"0","B":"1","C":"6","D":"16"},"answer":"C"},{"id":"c6q42","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":42,"question":"(Bài tập Priority) Thời gian chờ trung bình của 5 tiến trình trong ví dụ trên là bao nhiêu?","options":{"A":"5.5 msec","B":"6.2 msec","C":"8.2 msec","D":"9.5 msec"},"answer":"C"},{"id":"c6q43","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":43,"question":"Khái niệm \"quantum q\" trong giải thuật Round Robin (RR) dùng để chỉ điều gì?","options":{"A":"Dung lượng bộ nhớ tối đa cho phép","B":"Một đơn vị thời gian nhỏ sử dụng CPU (thường từ 10-100 ms) được cấp cho mỗi tiến trình","C":"Mã ưu tiên của tiến trình","D":"Thời gian chuyển ngữ cảnh"},"answer":"B"},{"id":"c6q44","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":44,"question":"Trong RR, điều gì xảy ra khi thời gian quantum (q) của một tiến trình đang chạy bị hết?","options":{"A":"Tiến trình bị kết thúc và xóa khỏi hệ thống","B":"CPU bị treo","C":"Tiến trình bị ngắt và được đưa vào cuối hàng đợi sẵn sàng (Ready Queue)","D":"HĐH tự động tăng độ ưu tiên của nó"},"answer":"C"},{"id":"c6q45","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":45,"question":"Nếu có n tiến trình trong hàng đợi sẵn sàng với thời gian quantum là q, thời gian TỐI ĐA một tiến trình phải đợi trước khi nhận CPU ở lượt kế tiếp là bao nhiêu?","options":{"A":"n×q","B":"(n−1)q","C":"(n+1)q","D":"q/n"},"answer":"B"},{"id":"c6q46","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":46,"question":"Bộ phận nào gây ra ngắt (interrupt) sau mỗi khoảng quantum để chuyển đổi tiến trình trong RR?","options":{"A":"Bộ điều khiển đĩa","B":"Khối quản lý bộ nhớ (MMU)","C":"Bộ định giờ (Timer)","D":"Màn hình (Monitor)"},"answer":"C"},{"id":"c6q47","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":47,"question":"Điều gì xảy ra đối với hiệu suất của giải thuật RR nếu giá trị quantum q được chọn \"quá lớn\"?","options":{"A":"Hệ thống bị treo (Deadlock)","B":"Tăng đột biến chi phí chuyển ngữ cảnh","C":"RR thoái hóa và hoạt động giống hệt giải thuật FIFO (FCFS)","D":"Tiết kiệm điện năng CPU"},"answer":"C"},{"id":"c6q48","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":48,"question":"Điều kiện lý tưởng về mặt thời gian để cấu hình giải thuật RR hiệu quả là gì?","options":{"A":"Thời gian quantum q phải nhỏ hơn thời gian chuyển ngữ cảnh","B":"Thời gian quantum q phải cực kỳ nhỏ (vài microseconds)","C":"Thời gian quantum q phải lớn hơn nhiều so với thời gian chuyển ngữ cảnh","D":"Thời gian chuyển ngữ cảnh phải luôn lớn hơn q"},"answer":"C"},{"id":"c6q49","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":49,"question":"So sánh Round Robin với SJF, nhận định nào sau đây là ĐÚNG?","options":{"A":"RR có thời gian hoàn tất trung bình thấp hơn SJF","B":"RR có thời gian hoàn tất trung bình cao hơn SJF, nhưng tính đáp ứng tốt hơn","C":"RR luôn dẫn đến Đói CPU","D":"Cả hai đều là thuật toán độc quyền (nonpreemptive)"},"answer":"B"},{"id":"c6q50","chapter":6,"chapterTitle":"ĐỊNH THỜI CPU","number":50,"question":"(Bài tập Round Robin) Giả sử P1=24, P2=3, P3=3 cùng đến tại t=0. Cho q = 4. CPU sẽ chạy P1 trong khoảng thời gian đầu tiên từ t=0 đến t=4. Tại t=4, tiến trình nào sẽ được chạy tiếp theo?","options":{"A":"P1 tiếp tục","B":"P2","C":"P3","D":"Bất kỳ"},"answer":"B"},{"id":"c7q1","chapter":7,"chapterTitle":"TẮC NGHẼN","number":1,"question":"Theo mô hình hệ thống, mỗi tiến trình sử dụng tài nguyên theo trình tự 3 bước nào?","options":{"A":"Đọc (Read), Ghi (Write), Đóng (Close)","B":"Yêu cầu (Request), Sử dụng (Use), Giải phóng (Release)","C":"Cấp phát (Allocation), Sử dụng (Use), Xóa (Delete)","D":"Chờ đợi (Wait), Thực thi (Run), Kết thúc (Terminate)"},"answer":"B"},{"id":"c7q2","chapter":7,"chapterTitle":"TẮC NGHẼN","number":2,"question":"Tắc nghẽn (Deadlock) được định nghĩa là tình huống như thế nào?","options":{"A":"Quá nhiều tiến trình cùng truy cập vào bộ nhớ RAM","B":"CPU hoạt động quá công suất gây treo máy","C":"Hai hoặc nhiều tiến trình đang chờ đợi vô hạn cho một sự kiện mà chỉ có thể được gây ra bởi một trong các tiến trình đang chờ đó","D":"Tiến trình chạy vòng lặp vô tận do lỗi lập trình"},"answer":"C"},{"id":"c7q3","chapter":7,"chapterTitle":"TẮC NGHẼN","number":3,"question":"Trong ví dụ về tắc nghẽn, nếu hệ thống có 3 ổ đĩa CD RW và 3 tiến trình, mỗi tiến trình đang giữ 1 ổ đĩa và đều yêu cầu thêm 1 ổ đĩa nữa thì sự kiện các tiến trình đang chờ đợi là gì?","options":{"A":"\"Bộ nhớ RAM được giải phóng\"","B":"\"Ổ CD RW được giải phóng\"","C":"\"CPU nhàn rỗi\"","D":"\"Máy in được cấp phát\""},"answer":"B"},{"id":"c7q4","chapter":7,"chapterTitle":"TẮC NGHẼN","number":4,"question":"Tắc nghẽn sẽ xuất hiện nếu CẢ BAO NHIÊU điều kiện xảy ra đồng thời?","options":{"A":"2 điều kiện","B":"3 điều kiện","C":"4 điều kiện","D":"5 điều kiện"},"answer":"C"},{"id":"c7q5","chapter":7,"chapterTitle":"TẮC NGHẼN","number":5,"question":"Điều kiện \"Độc quyền truy xuất\" (Mutual Exclusion) trong tắc nghẽn có nghĩa là gì?","options":{"A":"Tại một thời điểm chỉ có duy nhất 1 tiến trình sử dụng tài nguyên","B":"Tiến trình có thể truy cập bất kỳ tài nguyên nào","C":"Tiến trình phải trả phí để dùng tài nguyên","D":"Hệ điều hành độc quyền thu hồi tài nguyên"},"answer":"A"},{"id":"c7q6","chapter":7,"chapterTitle":"TẮC NGHẼN","number":6,"question":"Điều kiện \"Giữ và đợi\" (Hold and Wait) xảy ra khi nào?","options":{"A":"Tiến trình giữ mọi tài nguyên và đợi CPU xử lý","B":"Tiến trình không giữ tài nguyên nào nhưng phải đợi","C":"Một tiến trình giữ ít nhất 1 tài nguyên và đang chờ thêm tài nguyên được giữ bởi tiến trình khác","D":"Tiến trình tự động lưu dữ liệu vào đĩa cứng"},"answer":"C"},{"id":"c7q7","chapter":7,"chapterTitle":"TẮC NGHẼN","number":7,"question":"Tình huống \"một tài nguyên có thể chỉ được giải phóng một cách tự nguyện bởi một tiến trình đang giữ nó sau khi hoàn thành tác vụ\" mô tả điều kiện nào của tắc nghẽn?","options":{"A":"Độc quyền truy xuất","B":"Đợi vòng quanh","C":"Giữ và đợi","D":"Không ưu tiên (No preemption)"},"answer":"D"},{"id":"c7q8","chapter":7,"chapterTitle":"TẮC NGHẼN","number":8,"question":"Điều kiện \"Đợi vòng quanh\" (Circular wait) mô tả một tập các tiến trình {P0, P1, ..., Pn} đang chờ tài nguyên theo quy luật nào?","options":{"A":"P0 chờ P1, P1 chờ P2, ..., Pn chờ P0","B":"Tất cả cùng chờ P0","C":"Pn không chờ ai cả","D":"Tiến trình có ưu tiên thấp chờ tiến trình có ưu tiên cao"},"answer":"A"},{"id":"c7q9","chapter":7,"chapterTitle":"TẮC NGHẼN","number":9,"question":"Trong Đồ thị cấp phát tài nguyên (RAG), tập các đỉnh V được chia thành 2 loại nào?","options":{"A":"RAM và CPU","B":"Tiến trình (P) và Tài nguyên (R)","C":"Trạng thái Running và Waiting","D":"Cạnh có hướng và cạnh vô hướng"},"answer":"B"},{"id":"c7q10","chapter":7,"chapterTitle":"TẮC NGHẼN","number":10,"question":"Trong RAG, \"Cạnh yêu cầu\" (request edge) có hướng di chuyển như thế nào?","options":{"A":"Từ Tiến trình Pi tới Tài nguyên Rj (Pi → Rj)","B":"Từ Tài nguyên Rj tới Tiến trình Pi (Rj → Pi)","C":"Giữa hai Tiến trình với nhau","D":"Giữa hai Tài nguyên với nhau"},"answer":"A"},{"id":"c7q11","chapter":7,"chapterTitle":"TẮC NGHẼN","number":11,"question":"Cạnh có hướng từ Tài nguyên Rj tới Tiến trình Pi (Rj → Pi) được gọi là gì?","options":{"A":"Cạnh yêu cầu","B":"Cạnh đòi hỏi","C":"Cạnh cấp phát (assignment edge)","D":"Cạnh khôi phục"},"answer":"C"},{"id":"c7q12","chapter":7,"chapterTitle":"TẮC NGHẼN","number":12,"question":"Theo suy luận từ Đồ thị cấp phát tài nguyên, nếu đồ thị KHÔNG chứa vòng thì hệ thống ở trạng thái nào?","options":{"A":"Chắc chắn có tắc nghẽn","B":"Không tắc nghẽn","C":"Có khả năng tắc nghẽn","D":"Tắc nghẽn mạng"},"answer":"B"},{"id":"c7q13","chapter":7,"chapterTitle":"TẮC NGHẼN","number":13,"question":"Nếu đồ thị RAG có chứa vòng và mỗi tài nguyên chỉ có 1 thực thể duy nhất, thì hệ thống sẽ ra sao?","options":{"A":"Không tắc nghẽn","B":"Có khả năng tắc nghẽn","C":"Chắc chắn bị tắc nghẽn","D":"Tự động khôi phục"},"answer":"C"},{"id":"c7q14","chapter":7,"chapterTitle":"TẮC NGHẼN","number":14,"question":"Nếu đồ thị RAG chứa vòng nhưng các tài nguyên có nhiều thực thể (instance), thì hệ thống sẽ ra sao?","options":{"A":"Có khả năng tắc nghẽn (có thể có hoặc không)","B":"Chắc chắn bị tắc nghẽn","C":"Chắc chắn an toàn","D":"HĐH sẽ sụp đổ ngay lập tức"},"answer":"A"},{"id":"c7q15","chapter":7,"chapterTitle":"TẮC NGHẼN","number":15,"question":"Hầu hết các hệ điều hành hiện nay, bao gồm cả UNIX, thường chọn phương pháp xử lý tắc nghẽn nào?","options":{"A":"Luôn luôn ngăn chặn tắc nghẽn","B":"Chạy các giải thuật tránh tắc nghẽn liên tục","C":"Cho phép xảy ra tắc nghẽn rồi mới khôi phục","D":"Bỏ qua việc xử lý tắc nghẽn, xem như hệ thống không bao giờ xảy ra tắc nghẽn"},"answer":"D"},{"id":"c7q16","chapter":7,"chapterTitle":"TẮC NGHẼN","number":16,"question":"Phương pháp \"Ngăn chặn tắc nghẽn\" (Prevention) hoạt động dựa trên nguyên tắc nào?","options":{"A":"Khôi phục tiến trình khi xảy ra lỗi","B":"Bỏ qua hoàn toàn tắc nghẽn","C":"Ngăn chặn 1 trong 4 điều kiện làm xuất hiện tắc nghẽn","D":"Phân quyền người dùng"},"answer":"C"},{"id":"c7q17","chapter":7,"chapterTitle":"TẮC NGHẼN","number":17,"question":"Để ngăn chặn điều kiện \"Giữ và đợi\", hệ thống yêu cầu tiến trình phải làm gì?","options":{"A":"Tự động hủy tài nguyên khi dùng xong","B":"Yêu cầu và được cấp tất cả tài nguyên trước khi bắt đầu thực thi, hoặc chỉ được yêu cầu khi không giữ tài nguyên nào","C":"Liên tục cập nhật trạng thái RAM","D":"Bỏ qua các tài nguyên không dùng tới"},"answer":"B"},{"id":"c7q18","chapter":7,"chapterTitle":"TẮC NGHẼN","number":18,"question":"Hạn chế lớn nhất của việc ngăn chặn điều kiện \"Giữ và đợi\" là gì?","options":{"A":"Gây cháy CPU","B":"Việc sử dụng tài nguyên thấp và có thể gây \"đói\" tài nguyên (starvation)","C":"Mất dữ liệu người dùng","D":"Yêu cầu bộ nhớ đệm cực lớn"},"answer":"B"},{"id":"c7q19","chapter":7,"chapterTitle":"TẮC NGHẼN","number":19,"question":"Giải pháp để ngăn chặn điều kiện \"Đợi vòng quanh\" là gì?","options":{"A":"Tắt hệ thống định kỳ","B":"Đặt tất cả các loại tài nguyên vào một thứ tự, đòi hỏi mỗi tiến trình yêu cầu tài nguyên theo thứ tự tăng dần","C":"Cấp phát ngẫu nhiên tài nguyên","D":"Chạy luân phiên các tiến trình"},"answer":"B"},{"id":"c7q20","chapter":7,"chapterTitle":"TẮC NGHẼN","number":20,"question":"Phương pháp \"Tránh tắc nghẽn\" (Avoidance) yêu cầu tiến trình phải khai báo trước thông tin gì?","options":{"A":"Tên của người dùng tiến trình","B":"Mã nguồn của chương trình","C":"Số tài nguyên TỐI ĐA của mỗi loại mà tiến trình cần","D":"Tốc độ CPU yêu cầu"},"answer":"C"},{"id":"c7q21","chapter":7,"chapterTitle":"TẮC NGHẼN","number":21,"question":"Mục tiêu cốt lõi của các thuật toán Tránh tắc nghẽn là gì?","options":{"A":"Đảm bảo hệ thống không bao giờ rơi vào \"trạng thái không an toàn\"","B":"Cho phép tắc nghẽn xảy ra rồi gỡ bỏ","C":"Đóng băng các tiến trình","D":"Tối đa hóa hiệu năng CPU"},"answer":"A"},{"id":"c7q22","chapter":7,"chapterTitle":"TẮC NGHẼN","number":22,"question":"Hệ thống được gọi là ở \"Trạng thái an toàn\" (Safe state) khi nào?","options":{"A":"Khi không có tiến trình nào đang chạy","B":"Khi bộ nhớ RAM trống 100%","C":"Tồn tại một \"chuỗi tiến trình an toàn\" <P1, P2, …, Pn> mà yêu cầu của mỗi Pi có thể được đáp ứng bởi tài nguyên sẵn có cộng với tài nguyên đang giữ bởi các Pj (j < i)","D":"Khi CPU chạy dưới 50% công suất"},"answer":"C"},{"id":"c7q23","chapter":7,"chapterTitle":"TẮC NGHẼN","number":23,"question":"Nhận định nào sau đây là ĐÚNG về mối quan hệ giữa trạng thái an toàn và tắc nghẽn?","options":{"A":"Trạng thái an toàn đồng nghĩa với tắc nghẽn","B":"Trạng thái không an toàn CHẮC CHẮN là tắc nghẽn","C":"Nếu hệ thống ở trạng thái không an toàn ⇒ có KHẢ NĂNG tắc nghẽn","D":"Trạng thái không an toàn luôn luôn an toàn"},"answer":"C"},{"id":"c7q24","chapter":7,"chapterTitle":"TẮC NGHẼN","number":24,"question":"Đối với hệ thống mà mỗi tài nguyên CÓ NHIỀU THỰC THỂ (instances), ta sử dụng giải thuật tránh tắc nghẽn nào?","options":{"A":"Đồ thị cấp phát tài nguyên (RAG)","B":"Giải thuật Banker","C":"Giải thuật Peterson","D":"Đồ thị chờ (Wait-for graph)"},"answer":"B"},{"id":"c7q25","chapter":7,"chapterTitle":"TẮC NGHẼN","number":25,"question":"Trong phương pháp đồ thị RAG (dùng cho 1 thực thể), cạnh biểu diễn bằng nét đứt (Pi ⋯→ Rj) cho biết tiến trình Pi có thể yêu cầu tài nguyên Rj trong tương lai, được gọi là gì?","options":{"A":"Cạnh yêu cầu (Request edge)","B":"Cạnh cấp phát (Assignment edge)","C":"Cạnh đòi hỏi (Claim edge)","D":"Cạnh vô hướng"},"answer":"C"},{"id":"c7q26","chapter":7,"chapterTitle":"TẮC NGHẼN","number":26,"question":"Theo giải thuật RAG, khi một tiến trình thực sự yêu cầu tài nguyên, cạnh đòi hỏi (nét đứt) sẽ chuyển thành cạnh gì?","options":{"A":"Cạnh cấp phát","B":"Cạnh yêu cầu (Request edge - nét liền)","C":"Vẫn giữ nguyên cạnh đòi hỏi","D":"Cạnh khôi phục"},"answer":"B"},{"id":"c7q27","chapter":7,"chapterTitle":"TẮC NGHẼN","number":27,"question":"Theo giải thuật RAG tránh tắc nghẽn, một yêu cầu tài nguyên sẽ được hệ thống cấp phát CHỈ KHI NÀO?","options":{"A":"Khi tiến trình có độ ưu tiên cao nhất","B":"Bất cứ khi nào tài nguyên đó đang rảnh rỗi","C":"Khi việc chuyển từ cạnh yêu cầu thành cạnh cấp phát KHÔNG tạo thành vòng (chu trình) trong đồ thị","D":"Khi người dùng nhấn nút xác nhận"},"answer":"C"},{"id":"c7q28","chapter":7,"chapterTitle":"TẮC NGHẼN","number":28,"question":"Trong cấu trúc dữ liệu của Giải thuật Banker, ma trận Allocation có ý nghĩa gì?","options":{"A":"Số thực thể tài nguyên đang sẵn sàng cho mượn","B":"Số thực thể tối đa mà tiến trình yêu cầu","C":"Số thực thể của tài nguyên ĐÃ ĐƯỢC CẤP PHÁT (đang giữ) cho tiến trình","D":"Số lượng tài nguyên cần thêm để hoàn thành tác vụ"},"answer":"C"},{"id":"c7q29","chapter":7,"chapterTitle":"TẮC NGHẼN","number":29,"question":"Trong Giải thuật Banker, công thức để tính số lượng tài nguyên tiến trình CÒN CẦN (Ma trận Need) là gì?","options":{"A":"Need[i,j] = Available[j] - Allocation[i,j]","B":"Need[i,j] = Max[i,j] - Allocation[i,j]","C":"Need[i,j] = Max[i,j] + Allocation[i,j]","D":"Need[i,j] = Work[j] - Request[i,j]"},"answer":"B"},{"id":"c7q30","chapter":7,"chapterTitle":"TẮC NGHẼN","number":30,"question":"Trong Giải thuật xác định trạng thái an toàn của Banker, hệ thống sẽ chọn một tiến trình i thỏa mãn hai điều kiện nào để tiếp tục?","options":{"A":"Finish[i] == false và Need_i <= Work","B":"Finish[i] == true và Need_i > Work","C":"Allocation_i == 0 và Max_i <= Work","D":"Request_i <= Available và Finish[i] == true"},"answer":"A"},{"id":"c7q31","chapter":7,"chapterTitle":"TẮC NGHẼN","number":31,"question":"(Bài tập Banker) Trong một hệ thống, tiến trình P0 có Max là (7, 5, 3), và Allocation hiện tại là (0, 1, 0). Vector Need của P0 sẽ là bao nhiêu?","options":{"A":"(7, 6, 3)","B":"(7, 5, 3)","C":"(7, 4, 3)","D":"(0, 1, 0)"},"answer":"C"},{"id":"c7q32","chapter":7,"chapterTitle":"TẮC NGHẼN","number":32,"question":"(Bài tập Banker) Cho Available hiện hành là (3, 3, 2). Tiến trình P1 có Need là (1, 2, 2). Theo thuật toán an toàn, P1 có thỏa mãn điều kiện Need <= Available để thực thi không?","options":{"A":"Có, vì 1<=3, 2<=3, 2<=2","B":"Không, vì P1 cần nhiều hơn Available","C":"Không xác định được","D":"Có, vì Need luôn lớn hơn Available"},"answer":"A"},{"id":"c7q33","chapter":7,"chapterTitle":"TẮC NGHẼN","number":33,"question":"(Bài tập Banker) Trong quá trình dò tìm chuỗi an toàn, giả sử Work hiện tại là (3, 3, 2). Tiến trình P1 có Need=(1, 2, 2) và Allocation=(2, 0, 0) được chọn để hoàn thành. Sau khi P1 hoàn thành, Work MỚI sẽ bằng bao nhiêu?","options":{"A":"(4, 5, 4)","B":"(5, 3, 2) (Work = Work + Allocation = (3,3,2) + (2,0,0) = (5,3,2))","C":"(1, 1, 0)","D":"(2, 0, 0)"},"answer":"B"},{"id":"c7q34","chapter":7,"chapterTitle":"TẮC NGHẼN","number":34,"question":"Khi một tiến trình Pi đưa ra một yêu cầu tài nguyên (Request_i), bước KIỂM TRA ĐẦU TIÊN trong Giải thuật Banker là gì?","options":{"A":"Kiểm tra xem Request_i <= Available không","B":"Cấp phát ngay lập tức","C":"Kiểm tra xem Request_i <= Need_i không (Nếu lớn hơn thì báo lỗi vì vượt quá đòi hỏi tối đa)","D":"Kết thúc tiến trình Pi"},"answer":"C"},{"id":"c7q35","chapter":7,"chapterTitle":"TẮC NGHẼN","number":35,"question":"Giả sử Request_i <= Need_i, bước thứ hai trong thuật toán yêu cầu tài nguyên của Banker là kiểm tra xem Request_i có <= Available không. Nếu KHÔNG thỏa mãn, hệ thống sẽ làm gì?","options":{"A":"Pi phải chờ vì tài nguyên không có sẵn","B":"Pi bị hủy bỏ ngay lập tức","C":"Lấy tài nguyên từ tiến trình khác","D":"Hệ thống tự động cấp phát bỏ qua Available"},"answer":"A"},{"id":"c7q36","chapter":7,"chapterTitle":"TẮC NGHẼN","number":36,"question":"Nếu yêu cầu của tiến trình vượt qua 2 bước kiểm tra ban đầu, Giải thuật Banker sẽ GIẢ VỜ cấp phát tài nguyên cho Pi bằng cách cập nhật trạng thái hệ thống theo công thức nào?","options":{"A":"Available = Available + Request, Allocation = Allocation - Request","B":"Available = Available - Request, Allocation = Allocation + Request, Need = Need - Request","C":"Available = 0, Allocation = Max","D":"Need = Max + Request"},"answer":"B"},{"id":"c7q37","chapter":7,"chapterTitle":"TẮC NGHẼN","number":37,"question":"Sau khi giả vờ cấp phát, hệ thống chạy Giải thuật an toàn. Nếu kết quả trả về là hệ thống rơi vào trạng thái \"Không an toàn\", điều gì sẽ xảy ra?","options":{"A":"Pi vẫn được cấp phát tài nguyên","B":"HĐH tự động khởi động lại","C":"Pi phải chờ, và trạng thái cấp phát tài nguyên cũ được PHỤC HỒI","D":"Pi sẽ bị hủy bỏ (terminate)"},"answer":"C"},{"id":"c7q38","chapter":7,"chapterTitle":"TẮC NGHẼN","number":38,"question":"(Bài tập Banker) Giả sử trạng thái Available ban đầu là (3, 3, 2). Tiến trình P1 yêu cầu Request_1 = (1, 0, 2). Nếu giả vờ cấp phát cho P1, Available mới sẽ là bao nhiêu?","options":{"A":"(4, 3, 4)","B":"(2, 3, 0) (Available = Available - Request = (3,3,2) - (1,0,2))","C":"(3, 3, 2)","D":"(0, 0, 0)"},"answer":"B"},{"id":"c7q39","chapter":7,"chapterTitle":"TẮC NGHẼN","number":39,"question":"Giải thuật \"Phát hiện tắc nghẽn\" (Deadlock Detection) đối với hệ thống mà MỖI TÀI NGUYÊN CHỈ CÓ 1 THỰC THỂ sử dụng phương pháp nào?","options":{"A":"Giải thuật Banker","B":"Đồ thị chờ (Wait-for graph)","C":"Giải thuật Peterson","D":"Vòng lặp For"},"answer":"B"},{"id":"c7q40","chapter":7,"chapterTitle":"TẮC NGHẼN","number":40,"question":"Đồ thị chờ (Wait-for graph) được xây dựng dựa trên nguyên tắc nào?","options":{"A":"Các đỉnh là tài nguyên, cạnh từ R_i đến R_j","B":"Các đỉnh là tiến trình, cạnh từ P_i đến P_j nếu P_i đang chờ P_j (bỏ qua các nút tài nguyên)","C":"Đỉnh là CPU và RAM","D":"Cạnh 2 chiều giữa mọi tiến trình"},"answer":"B"},{"id":"c7q41","chapter":7,"chapterTitle":"TẮC NGHẼN","number":41,"question":"Theo tài liệu, để phát hiện một chu trình trong Đồ thị chờ có n đỉnh, giải thuật sẽ mất bao nhiêu thao tác lệnh (Độ phức tạp)?","options":{"A":"n thao tác","B":"log(n) thao tác","C":"n2 thao tác","D":"n3 thao tác"},"answer":"C"},{"id":"c7q42","chapter":7,"chapterTitle":"TẮC NGHẼN","number":42,"question":"Giải thuật Phát hiện tắc nghẽn cho tài nguyên NHIỀU THỰC THỂ sử dụng các ma trận cấu trúc dữ liệu nào?","options":{"A":"Chỉ có Available","B":"Available, Allocation, và Request","C":"Available, Max, Need","D":"Đồ thị RAG"},"answer":"B"},{"id":"c7q43","chapter":7,"chapterTitle":"TẮC NGHẼN","number":43,"question":"Khác với Banker, trong bước khởi tạo Giải thuật Phát hiện tắc nghẽn, giá trị Finish[i] được khởi tạo là false CHỈ KHI NÀO?","options":{"A":"Luôn luôn khởi tạo false cho mọi tiến trình","B":"Khi tiến trình chưa hoàn thành","C":"Khi Allocation_i != 0 (tiến trình đang giữ ít nhất 1 tài nguyên)","D":"Khi Request_i == 0"},"answer":"C"},{"id":"c7q44","chapter":7,"chapterTitle":"TẮC NGHẼN","number":44,"question":"Việc quyết định \"Khi nào nên gọi Giải thuật phát hiện tắc nghẽn?\" phụ thuộc vào 2 nhân tố chính nào?","options":{"A":"Dung lượng RAM và tốc độ CPU","B":"Tắc nghẽn có thường xảy ra hay không? VÀ Có bao nhiêu tiến trình bị ảnh hưởng khi xảy ra?","C":"Số lượng người dùng và băng thông mạng","D":"Yêu cầu của người dùng và thời lượng Pin"},"answer":"B"},{"id":"c7q45","chapter":7,"chapterTitle":"TẮC NGHẼN","number":45,"question":"Nếu hệ thống phát hiện có tắc nghẽn, phương pháp \"Khôi phục từ tắc nghẽn bằng cách kết thúc tiến trình\" có những lựa chọn nào?","options":{"A":"Hủy bỏ tất cả các tiến trình bị tắc nghẽn HOẶC Hủy bỏ từng tiến trình một cho đến khi chu kỳ tắc nghẽn được loại bỏ","B":"Khởi động lại toàn bộ máy tính ngay lập tức","C":"Cấp thêm tài nguyên từ mạng","D":"Chuyển các tiến trình sang chạy trên máy khác"},"answer":"A"},{"id":"c7q46","chapter":7,"chapterTitle":"TẮC NGHẼN","number":46,"question":"Đâu KHÔNG PHẢI là tiêu chí để lựa chọn thứ tự hủy bỏ tiến trình (khi khôi phục tắc nghẽn)?","options":{"A":"Độ ưu tiên của tiến trình","B":"Tài nguyên tiến trình đã sử dụng hoặc đang cần","C":"Kích thước ổ cứng vật lý của máy tính","D":"Tiến trình là tương tác hay theo lô"},"answer":"C"},{"id":"c7q47","chapter":7,"chapterTitle":"TẮC NGHẼN","number":47,"question":"Phương pháp \"Khôi phục bằng sự ưu tiên tài nguyên\" (Resource Preemption) hoạt động bằng cách nào?","options":{"A":"Tự động mua thêm RAM","B":"Lựa chọn một \"tiến trình nạn nhân\" để thu hồi tài nguyên (ưu tiên chi phí thấp nhất)","C":"Gửi yêu cầu xin xỏ tài nguyên qua mạng lưới","D":"Đóng băng tài nguyên vô thời hạn"},"answer":"B"},{"id":"c7q48","chapter":7,"chapterTitle":"TẮC NGHẼN","number":48,"question":"Trong ưu tiên tài nguyên, kỹ thuật \"Rollback\" có ý nghĩa là gì?","options":{"A":"Phá hủy toàn bộ tiến trình","B":"Dịch ngược mã nguồn chương trình","C":"Quay trở lại một số trạng thái an toàn trước đó, và khởi động lại tiến trình ở trạng thái đó","D":"Thu hồi 100% tài nguyên hệ thống"},"answer":"C"},{"id":"c7q49","chapter":7,"chapterTitle":"TẮC NGHẼN","number":49,"question":"Nếu hệ thống luôn chọn CÙNG MỘT TIẾN TRÌNH làm \"nạn nhân\" để thu hồi tài nguyên, hiện tượng gì sẽ xảy ra?","options":{"A":"Đói tài nguyên (Starvation) - tiến trình đó sẽ không bao giờ được hoàn thành","B":"Đảo độ ưu tiên","C":"Hệ thống sẽ chạy nhanh gấp đôi","D":"Tắc nghẽn mạng"},"answer":"A"},{"id":"c7q50","chapter":7,"chapterTitle":"TẮC NGHẼN","number":50,"question":"Theo định lý tổng quát, để tránh \"Starvation\" khi áp dụng thu hồi tài nguyên, hệ thống cần phải làm gì?","options":{"A":"Không bao giờ thu hồi tài nguyên","B":"Giới hạn số lần (bound) một tiến trình có thể bị chọn làm nạn nhân (ví dụ thêm số lần rollback vào tham số đánh giá chi phí)","C":"Luôn luôn chọn tiến trình hệ thống làm nạn nhân","D":"Bắt buộc người dùng tự tắt ứng dụng"},"answer":"B"},{"id":"c8q1","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":1,"question":"Bộ lưu trữ duy nhất nào mà CPU có thể truy cập trực tiếp?","options":{"A":"Đĩa từ và Băng từ","B":"Bộ nhớ chính và các thanh ghi","C":"Khối điều khiển thiết bị (Device Controller)","D":"Ổ cứng SSD"},"answer":"B"},{"id":"c8q2","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":2,"question":"Cặp thanh ghi nào được sử dụng để xác định và bảo vệ không gian địa chỉ logic của tiến trình?","options":{"A":"Thanh ghi PC và Thanh ghi chỉ lệnh","B":"Thanh ghi bộ đệm và Thanh ghi dữ liệu","C":"Thanh ghi nền (Base) và Thanh ghi giới hạn (Limit)","D":"Thanh ghi cờ và Thanh ghi đoạn"},"answer":"C"},{"id":"c8q3","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":3,"question":"Việc kết buộc địa chỉ (Address binding) vào \"Thời điểm biên dịch\" (Compile time) sẽ tạo ra loại mã nào nếu vị trí bộ nhớ đã được biết trước?","options":{"A":"Mã tương đối","B":"Mã hạt nhân","C":"Mã hệ thống","D":"Mã tuyệt đối (Absolute code)"},"answer":"D"},{"id":"c8q4","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":4,"question":"Kết buộc địa chỉ vào \"Thời điểm nạp\" (Load time) yêu cầu tạo ra loại mã nào?","options":{"A":"Mã tương đối (Relative code)","B":"Mã tuyệt đối","C":"Mã nhị phân","D":"Mã hợp ngữ"},"answer":"A"},{"id":"c8q5","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":5,"question":"Kết buộc địa chỉ bị trì hoãn đến \"Thời điểm xử lý\" (Run time) trong trường hợp nào?","options":{"A":"Khi hệ thống không có ổ đĩa cứng","B":"Khi bộ nhớ RAM bị lỗi","C":"Khi tiến trình có thể được di chuyển từ một phân đoạn bộ nhớ này sang phân đoạn khác trong suốt quá trình thực thi","D":"Khi tiến trình chỉ chạy trên chế độ MS-DOS"},"answer":"C"},{"id":"c8q6","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":6,"question":"Địa chỉ được tạo ra bởi CPU còn được gọi là gì?","options":{"A":"Địa chỉ vật lý (Physical address)","B":"Địa chỉ logic (Logical address) hoặc địa chỉ ảo (Virtual address)","C":"Địa chỉ tương đối","D":"Địa chỉ MAC"},"answer":"B"},{"id":"c8q7","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":7,"question":"Thiết bị phần cứng nào chịu trách nhiệm ánh xạ địa chỉ ảo thành địa chỉ vật lý tại thời điểm chạy?","options":{"A":"Đơn vị quản lý bộ nhớ (Memory-Management Unit - MMU)","B":"Đơn vị số học và logic (ALU)","C":"Bộ phân phối (Dispatcher)","D":"Khối điều khiển tiến trình (PCB)"},"answer":"A"},{"id":"c8q8","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":8,"question":"Ưu điểm của kỹ thuật \"Nạp động\" (Dynamic loading) là gì?","options":{"A":"Thủ tục không được nạp cho đến khi nó được gọi, giúp sử dụng không gian bộ nhớ tốt hơn","B":"Tiến trình không bao giờ phải thoát","C":"Tăng tốc độ vòng quay ổ cứng","D":"Giảm số lượng thanh ghi CPU"},"answer":"A"},{"id":"c8q9","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":9,"question":"Trong kỹ thuật \"Liên kết động\" (Dynamic linking), đoạn mã nhỏ dùng để định vị trí của thủ tục thư viện trong bộ nhớ được gọi là gì?","options":{"A":"Block","B":"Stub","C":"Thread","D":"Module"},"answer":"B"},{"id":"c8q10","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":10,"question":"\"Liên kết động\" đặc biệt hữu ích cho hệ thống nào?","options":{"A":"Hệ thống nhúng thời gian thực","B":"Quản lý ổ đĩa quang","C":"Các thư viện chia sẻ (Thư viện hệ thống)","D":"Phần mềm diệt virus"},"answer":"C"},{"id":"c8q11","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":11,"question":"Hoán đổi (Swapping) tiến trình có nghĩa là gì?","options":{"A":"Chuyển đổi qua lại giữa giao diện dòng lệnh và đồ họa","B":"Tiến trình được hoán đổi tạm thời ra khỏi bộ nhớ đến một kho lưu trữ (backing store) và sau đó đưa trở lại bộ nhớ để tiếp tục","C":"Sao lưu dữ liệu dự phòng","D":"Thay đổi mã nguồn tiến trình"},"answer":"B"},{"id":"c8q12","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":12,"question":"Thuật ngữ \"Chuyển ra, chuyển vào\" (Roll out, roll in) là biến thể của kỹ thuật hoán đổi áp dụng cho giải thuật định thời nào?","options":{"A":"Round Robin","B":"Shortest Job First (SJF)","C":"Định thời theo độ ưu tiên (Priority)","D":"First-Come, First-Served (FCFS)"},"answer":"C"},{"id":"c8q13","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":13,"question":"Phần lớn thời gian của quá trình hoán đổi tiến trình (swapping) phụ thuộc vào yếu tố nào?","options":{"A":"Thời gian CPU tính toán","B":"Thời gian di chuyển (transfer time) tỉ lệ thuận với lượng bộ nhớ được hoán đổi","C":"Thời gian chờ người dùng nhập phím","D":"Thời gian làm mát CPU"},"answer":"B"},{"id":"c8q14","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":14,"question":"Hệ điều hành iOS trên di động xử lý thế nào khi bộ nhớ trống thấp?","options":{"A":"Tự động hoán đổi toàn bộ dữ liệu ra ổ cứng","B":"Khởi động lại hệ điều hành","C":"Yêu cầu ứng dụng tự nguyện từ bỏ bộ nhớ được cấp phát; xóa dữ liệu read-only và nạp lại khi cần","D":"Tắt màn hình ngay lập tức"},"answer":"C"},{"id":"c8q15","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":15,"question":"Trong cấp phát bộ nhớ liên tục, bộ nhớ chính thường được chia thành 2 phần nào?","options":{"A":"RAM và ROM","B":"Hệ điều hành thường trú và Các tiến trình người dùng","C":"Vùng nhớ Code và Vùng nhớ Data","D":"Vùng nhớ Kernel và Vùng nhớ Driver"},"answer":"B"},{"id":"c8q16","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":16,"question":"Trong mô hình cấp phát liên tục với phân vùng thay đổi, khái niệm \"Hole\" (Hố nhớ) là gì?","options":{"A":"Lỗi phần cứng trên RAM","B":"Khối nhớ có sẵn (trống) nằm rải rác khắp bộ nhớ","C":"Phân vùng chứa hệ điều hành","D":"Các tệp tin bị hỏng"},"answer":"B"},{"id":"c8q17","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":17,"question":"Chiến lược cấp phát bộ nhớ \"First-fit\" hoạt động như thế nào?","options":{"A":"Cấp phát hố nhớ nhỏ nhất đủ lớn","B":"Cấp phát hố nhớ lớn nhất","C":"Cấp phát hố nhớ đầu tiên đủ lớn","D":"Cấp phát từ cuối bộ nhớ lên"},"answer":"C"},{"id":"c8q18","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":18,"question":"Chiến lược cấp phát bộ nhớ \"Best-fit\" có đặc điểm gì?","options":{"A":"Cấp phát hố nhớ lớn nhất để dùng dần","B":"Cấp phát hố nhớ đầu tiên tìm thấy","C":"Sinh ra hố nhớ còn lại lớn nhất","D":"Cấp phát hố nhớ nhỏ nhất đủ lớn; phải tìm toàn bộ danh sách"},"answer":"D"},{"id":"c8q19","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":19,"question":"Hiện tượng \"Phân mảnh bên ngoài\" (External Fragmentation) xảy ra khi nào?","options":{"A":"Bộ nhớ được cấp phát lớn hơn một chút so với bộ nhớ yêu cầu","B":"Tổng không gian bộ nhớ tồn tại đủ để thỏa mãn yêu cầu, nhưng nó không liên tục","C":"Đĩa cứng bị trầy xước","D":"Các tiến trình tranh giành CPU"},"answer":"B"},{"id":"c8q20","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":20,"question":"Phân tích chiến lược First-fit cho thấy quy tắc 50% có ý nghĩa gì?","options":{"A":"50% CPU bị lãng phí","B":"Cứ N khối được cấp phát thì 0.5N khối bị mất do phân mảnh (khoảng 1/3 bộ nhớ không được sử dụng)","C":"Tiến trình chỉ được dùng 50% RAM","D":"Tỷ lệ lỗi bộ nhớ là 50%"},"answer":"B"},{"id":"c8q21","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":21,"question":"Phương pháp nào được sử dụng để giảm phân mảnh bên ngoài bằng cách bố trí lại nội dung bộ nhớ?","options":{"A":"Nén bộ nhớ (Compaction)","B":"Bơm bộ nhớ","C":"Phân mảnh bên trong","D":"Định thời RR"},"answer":"A"},{"id":"c8q22","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":22,"question":"(Bài tập Cấp phát) Có các hố nhớ theo thứ tự: 600KB, 500KB, 200KB, 300KB. Tiến trình P1 yêu cầu 212KB. Theo thuật toán First-fit, P1 sẽ được cấp vào hố nhớ nào?","options":{"A":"Hố 600KB","B":"Hố 500KB","C":"Hố 200KB","D":"Hố 300KB"},"answer":"A"},{"id":"c8q23","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":23,"question":"(Bài tập Cấp phát) Tiếp tục với dãy hố nhớ (600, 500, 200, 300). Nếu dùng Best- fit, tiến trình P3 yêu cầu 112KB sẽ được đưa vào hố nhớ nào để tối ưu nhất?","options":{"A":"Hố 600KB","B":"Hố 500KB","C":"Hố 200KB","D":"Hố 300KB"},"answer":"C"},{"id":"c8q24","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":24,"question":"Khung nhìn của người dùng về bộ nhớ trong kỹ thuật \"Phân đoạn\" (Segmentation) là gì?","options":{"A":"Một khối bộ nhớ tuyến tính duy nhất","B":"Một tập hợp các trang bằng nhau","C":"Một tập hợp các phân đoạn (segments) có kích thước thay đổi chứa mã, dữ liệu, stack...","D":"Các tập tin trên đĩa"},"answer":"C"},{"id":"c8q25","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":25,"question":"Trong kiến trúc phân đoạn, địa chỉ logic bao gồm hai thành phần nào?","options":{"A":"Số trang và độ lệch trang","B":"Số phân đoạn (s) và độ lệch (d)","C":"Base và Limit","D":"Pid và Port"},"answer":"B"},{"id":"c8q26","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":26,"question":"Trong bảng phân đoạn, mục Limit dùng để làm gì?","options":{"A":"Lưu địa chỉ vật lý bắt đầu","B":"Chỉ định mức độ ưu tiên của tiến trình","C":"Xác định chiều dài của phân đoạn","D":"Trỏ tới bảng trang"},"answer":"C"},{"id":"c8q27","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":27,"question":"Thanh ghi STLR (Segment-table length register) có nhiệm vụ gì?","options":{"A":"Chỉ ra địa chỉ của bảng phân đoạn trên đĩa cứng","B":"Lưu kích thước của màn hình","C":"Cho biết số phân đoạn được sử dụng bởi một chương trình (để kiểm tra s < STLR)","D":"Lưu tổng số RAM của máy tính"},"answer":"C"},{"id":"c8q28","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":28,"question":"(Bài tập Phân đoạn) Cho bảng Segment 0 có Base=219, Limit=600. Địa chỉ logic (0, 430) tương ứng với địa chỉ vật lý nào?","options":{"A":"649 (Vì 219 + 430 và 430 < 600)","B":"430","C":"219","D":"Không hợp lệ"},"answer":"A"},{"id":"c8q29","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":29,"question":"(Bài tập Phân đoạn) Cho bảng Segment 1 có Base=2300, Limit=14. Địa chỉ logic (1, 10) tương ứng với địa chỉ vật lý nào?","options":{"A":"2300","B":"2310","C":"140","D":"Lỗi"},"answer":"B"},{"id":"c8q30","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":30,"question":"(Bài tập Phân đoạn) Cho bảng Segment 2 có Base=90, Limit=100. Địa chỉ logic (2, 500) sẽ ra kết quả gì?","options":{"A":"590","B":"500","C":"Địa chỉ có lỗi / Không hợp lệ (Do offset 500 > limit 100)","D":"90"},"answer":"C"},{"id":"c8q31","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":31,"question":"Kỹ thuật Phân trang (Paging) chia bộ nhớ vật lý thành các khối kích thước cố định gọi là gì?","options":{"A":"Khung trang (Frames)","B":"Phân đoạn (Segments)","C":"Sector","D":"Cluster"},"answer":"A"},{"id":"c8q32","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":32,"question":"Kỹ thuật Phân trang chia bộ nhớ logic thành các khối kích thước cố định gọi là gì?","options":{"A":"Khung trang (Frames)","B":"Trang (Pages)","C":"Gói tin (Packets)","D":"Đoạn (Segments)"},"answer":"B"},{"id":"c8q33","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":33,"question":"Mối quan hệ giữa kích thước Khung trang (Frame) và Trang (Page) là gì?","options":{"A":"Trang lớn gấp đôi Khung trang","B":"Khung trang lớn gấp đôi Trang","C":"Kích thước Trang và Khung trang là bằng nhau","D":"Không liên quan đến nhau"},"answer":"C"},{"id":"c8q34","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":34,"question":"Trong phân trang, địa chỉ do CPU tạo ra được chia thành 2 phần nào?","options":{"A":"Số đoạn (s) và độ lệch (d)","B":"Số trang (p) và độ lệch trang (d)","C":"Base và Limit","D":"User ID và Process ID"},"answer":"B"},{"id":"c8q35","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":35,"question":"Giả sử không gian địa chỉ logic có kích thước 2m và kích thước trang là 2n Phần \"Số trang (p)\" sẽ chiếm bao nhiêu bit?","options":{"A":"n bit","B":"m bit","C":"m−n bit","D":"m+n bit"},"answer":"C"},{"id":"c8q36","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":36,"question":"Thiết bị phần cứng dùng làm bộ đệm tham chiếu nhanh cho bảng trang có tên là gì?","options":{"A":"ROM","B":"Thanh ghi Limit","C":"Bộ nhớ kết hợp (Associative memory) hoặc TLB (Translation look-aside buffers)","D":"Đĩa đệm (Disk cache)"},"answer":"C"},{"id":"c8q37","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":37,"question":"Khái niệm \"Hit ratio\" (Tỷ lệ truy cập) trong TLB có ý nghĩa là gì?","options":{"A":"Số lần CPU bị treo","B":"Tỷ lệ phần trăm số trang bị lỗi","C":"Tỷ lệ phần trăm số lần một số trang được tìm thấy trong thanh ghi kết hợp (TLB)","D":"Tốc độ quay của đĩa cứng"},"answer":"C"},{"id":"c8q38","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":38,"question":"Xem xét tỷ lệ Hit ratio α=80%, thời gian tìm TLB ϵ=20ns, thời gian truy cập bộ nhớ là 100ns. Thời gian truy cập hiệu quả (EAT) tính theo công thức của HĐH là bao nhiêu?","options":{"A":"100ns","B":"120ns","C":"140ns","D":"200ns"},"answer":"B"},{"id":"c8q39","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":39,"question":"Nếu tỷ lệ Hit ratio α=99%, thời gian tìm TLB là 20ns, truy cập bộ nhớ là 100ns. Thời gian EAT là bao nhiêu?","options":{"A":"99ns","B":"100ns","C":"101ns","D":"120ns"},"answer":"C"},{"id":"c8q40","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":40,"question":"Để thực hiện bảo vệ bộ nhớ trong phân trang, bảng trang sử dụng thêm thành phần nào?","options":{"A":"Thanh ghi Base và Limit","B":"Mật khẩu người dùng","C":"Bit hợp lệ - không hợp lệ (valid - invalid bit)","D":"Phần cứng diệt virus"},"answer":"C"},{"id":"c8q41","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":41,"question":"Nhược điểm của kỹ thuật Phân trang (Paging) là vẫn gây ra loại phân mảnh nào?","options":{"A":"Phân mảnh bên ngoài","B":"Phân mảnh bên trong (Internal Fragmentation)","C":"Tắc nghẽn mạng","D":"Phân mảnh ổ cứng"},"answer":"B"},{"id":"c8q42","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":42,"question":"Lược đồ \"Bảng trang phân cấp\" (Hierarchical Page Table) có tác dụng gì?","options":{"A":"Nén các tập tin lớn","B":"Chia nhỏ bảng trang khổng lồ (ví dụ ở hệ thống 32-bit) thành nhiều bảng trang con để tránh cấp phát liên tục một vùng nhớ quá lớn","C":"Ngăn chặn virus truy cập RAM","D":"Chạy các tiến trình MS-DOS"},"answer":"B"},{"id":"c8q43","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":43,"question":"Đối với không gian địa chỉ lớn hơn 32-bit, hệ điều hành thường sử dụng kỹ thuật cấu trúc bảng trang nào?","options":{"A":"Phân đoạn thuần túy","B":"Bảng trang băm (Hashed Page Table)","C":"Danh sách liên kết đơn","D":"Bảng cấp phát FAT"},"answer":"B"},{"id":"c8q44","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":44,"question":"Điểm khác biệt của \"Bảng trang nghịch đảo\" (Inverted Page Table) là gì?","options":{"A":"Chỉ sử dụng 1 bit duy nhất cho toàn bộ hệ thống","B":"Nó theo dõi tất cả các trang vật lý: Có một mục nhập cho mỗi khung trang bộ nhớ thực (thay vì mỗi trang logic của tiến trình)","C":"Lưu trữ dữ liệu lộn ngược từ phải sang trái","D":"Không cần dùng bộ nhớ RAM"},"answer":"B"},{"id":"c8q45","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":45,"question":"Nhược điểm của Bảng trang nghịch đảo là gì?","options":{"A":"Chiếm quá nhiều RAM","B":"Làm tăng thời gian tìm kiếm khi một tham chiếu trang xuất hiện (do phải duyệt bảng)","C":"Không hỗ trợ địa chỉ 64-bit","D":"Gây quá nhiệt CPU"},"answer":"B"},{"id":"c8q46","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":46,"question":"(Bài tập Phân trang) Hệ thống máy tính có bộ nhớ chính 320MB. Kích thước trang là 8KB. Số khung trang vật lý của hệ thống là bao nhiêu?","options":{"A":"40000","B":"40960 trang","C":"8192","D":"32000"},"answer":"B"},{"id":"c8q47","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":47,"question":"(Bài tập Phân trang) Với kích thước trang là 8KB (213Bytes). Cần bao nhiêu bit để làm địa chỉ offset (độ lệch)?","options":{"A":"8 bit","B":"10 bit","C":"13 bit","D":"16 bit"},"answer":"C"},{"id":"c8q48","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":48,"question":"Kích thước không gian địa chỉ logic là 48 bit (248Bytes). Kích thước trang là 8KB (213Bytes). Số trang logic trong không gian tiến trình là bao nhiêu?","options":{"A":"235trang","B":"240 trang","C":"248 trang","D":"213trang"},"answer":"A"},{"id":"c8q49","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":49,"question":"Cho địa chỉ logic hệ thập phân là 20030, kích thước trang là 8192 Bytes (8KB). Yêu cầu đổi địa chỉ trên sang dạng <Số trang p, Độ lệch d>.","options":{"A":"<p = 2, d = 3646>","B":"<p = 3, d = 2000>","C":"<p = 1, d = 8192>","D":"<p = 4, d = 0>"},"answer":"A"},{"id":"c8q50","chapter":8,"chapterTitle":"QUẢN LÝ BỘ NHỚ","number":50,"question":"(Bài tập Phân trang) Không gian địa chỉ có 8 trang, mỗi trang 1KB. Ánh xạ vào bộ nhớ vật lý có 32 khung trang. Địa chỉ logic và Địa chỉ vật lý gồm bao nhiêu bit?","options":{"A":"Logic = 8 bit, Vật lý = 32 bit","B":"Logic = 13 bit, Vật lý = 15 bit","C":"Logic = 10 bit, Vật lý = 10 bit","D":"Logic = 3 bit, Vật lý = 5 bit"},"answer":"B"}];
const $=s=>document.querySelector(s); const letters=['A','B','C','D'];
let state={items:[],answers:{},index:0,mode:'end',finished:false};
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const chapters=[...new Map(BANK.map(q=>[q.chapter,q.chapterTitle]))];
chapters.forEach(([n,t])=>$('#chapter').insertAdjacentHTML('beforeend',`<option value="${n}">Chương ${n}: ${t}</option>`));
function save(){localStorage.setItem('hdhQuizState',JSON.stringify(state))}
function startQuiz(customItems=null){
 let items=customItems||BANK.filter(q=>$('#chapter').value==='all'||q.chapter===$('#chapter').value);
 if(!customItems&&$('#shuffle').value==='yes') items=shuffle([...items]); else items=[...items];
 if(!customItems&&$('#count').value!=='all') items=items.slice(0,Math.min(+$('#count').value,items.length));
 state={items:items.map(q=>q.id),answers:{},index:0,mode:$('#mode').value,finished:false}; save(); showQuiz();
}
function showQuiz(){$('#setup').classList.add('hidden');$('#result').classList.add('hidden');$('#quiz').classList.remove('hidden');render()}
function current(){return BANK.find(q=>q.id===state.items[state.index])}
function render(){
 const q=current(), total=state.items.length, picked=state.answers[q.id];
 $('#position').textContent=`Câu ${state.index+1} / ${total}`; $('#chapterName').textContent=`Chương ${q.chapter}: ${q.chapterTitle}`;
 $('#qmeta').textContent=`Câu ${q.number} trong tài liệu`; $('#qtext').textContent=q.question; $('#options').innerHTML=''; $('#feedback').textContent=''; $('#feedback').className='feedback';
 letters.forEach(l=>{const lab=document.createElement('label');lab.className='option';lab.innerHTML=`<input type="radio" name="ans" value="${l}" ${picked===l?'checked':''}> <b>${l}.</b> ${q.options[l]}`; lab.onclick=()=>choose(l); $('#options').appendChild(lab)});
 if(state.mode==='instant'&&picked) markAnswer(q,picked);
 const done=Object.keys(state.answers).length; $('#answeredCount').textContent=`Đã làm ${done}/${total}`; $('#progressBar').style.width=`${((state.index+1)/total)*100}%`; $('#prev').disabled=state.index===0; $('#next').textContent=state.index===total-1?'Đến cuối':'Câu tiếp →';
}
function choose(l){const q=current(); if(state.mode==='instant'&&state.answers[q.id]) return; state.answers[q.id]=l; save(); render()}
function markAnswer(q,picked){[...document.querySelectorAll('.option')].forEach((el,i)=>{const l=letters[i];if(l===q.answer)el.classList.add('correct');if(l===picked&&picked!==q.answer)el.classList.add('wrong')}); const ok=picked===q.answer; $('#feedback').textContent=ok?'✓ Chính xác':`✗ Sai. Đáp án đúng: ${q.answer}`; $('#feedback').classList.add(ok?'ok':'bad')}
$('#prev').onclick=()=>{if(state.index>0){state.index--;save();render()}}; $('#next').onclick=()=>{if(state.index<state.items.length-1){state.index++;save();render()}};
$('#start').onclick=()=>startQuiz(); $('#resume').onclick=()=>{const s=localStorage.getItem('hdhQuizState');if(!s)return alert('Chưa có bài đang làm.');state=JSON.parse(s);state.finished?finish():showQuiz()};
$('#submit').onclick=()=>{const unanswered=state.items.length-Object.keys(state.answers).length;if(unanswered&&!confirm(`Bạn còn ${unanswered} câu chưa trả lời. Vẫn nộp bài?`))return;finish()};
function finish(){state.finished=true;save();$('#quiz').classList.add('hidden');$('#setup').classList.add('hidden');$('#result').classList.remove('hidden'); const qs=state.items.map(id=>BANK.find(q=>q.id===id)); let correct=0;qs.forEach(q=>{if(state.answers[q.id]===q.answer)correct++}); const pct=Math.round(correct/qs.length*100);$('#score').textContent=`${correct} / ${qs.length}`;$('#summary').textContent=`Bạn đạt ${pct}%. Đúng ${correct} câu, sai hoặc bỏ trống ${qs.length-correct} câu.`; $('#review').innerHTML='';qs.forEach((q,i)=>{const p=state.answers[q.id]||'Chưa chọn',ok=p===q.answer;const d=document.createElement('div');d.className='review-item';d.innerHTML=`<div class="small">Câu ${i+1} • Chương ${q.chapter}</div><b>${q.question}</b><div class="${ok?'ok':'bad'}">Bạn chọn: ${p} ${p!=='Chưa chọn'?'- '+q.options[p]:''}</div>${!ok?`<div class="ok">Đáp án đúng: ${q.answer} - ${q.options[q.answer]}</div>`:''}`;$('#review').appendChild(d)})}
$('#retryWrong').onclick=()=>{const wrong=state.items.filter(id=>{const q=BANK.find(x=>x.id===id);return state.answers[id]!==q.answer});if(!wrong.length)return alert('Bạn không có câu sai.');startQuiz(wrong.map(id=>BANK.find(q=>q.id===id)))};
$('#newQuiz').onclick=()=>{localStorage.removeItem('hdhQuizState');$('#result').classList.add('hidden');$('#setup').classList.remove('hidden')};
$('#quit').onclick=()=>{if(confirm('Thoát về màn hình thiết lập? Tiến độ vẫn được lưu.')){$('#quiz').classList.add('hidden');$('#setup').classList.remove('hidden')}};
</script><script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
